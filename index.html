<script type="text/babel" data-presets="react">
// logo.jsx — Logo EDINUN usando el PNG oficial dorado.
// Nada de reconstruir en SVG: mantenemos el asset original impecable.

function EdinunLogo({ size = 180, glow = true }) {
  return (
    <div
      style={{
        width: size,
        height: size,
        position: "relative",
        filter: glow
          ? "drop-shadow(0 0 28px rgba(242,194,96,0.45)) drop-shadow(0 6px 12px rgba(0,0,0,0.45))"
          : "drop-shadow(0 2px 4px rgba(0,0,0,0.3))",
      }}
    >
      {glow && (
        <div
          style={{
            position: "absolute",
            inset: "-6%",
            borderRadius: "50%",
            background:
              "radial-gradient(circle, rgba(242,194,96,0.22) 0%, rgba(242,194,96,0.08) 45%, transparent 75%)",
            pointerEvents: "none",
          }}
        />
      )}
      <img
        src="assets/edinun-logo.png"
        alt="EDINUN — Ediciones Nacionales Unidas"
        style={{ width: "100%", height: "100%", objectFit: "contain", position: "relative", display: "block" }}
      />
    </div>
  );
}

// Versión compacta (HUD) — mismo PNG, tamaño pequeño
function EdinunLogoMini({ size = 40 }) {
  return (
    <img
      src="assets/edinun-logo.png"
      alt="EDINUN"
      style={{
        width: size,
        height: size,
        objectFit: "contain",
        filter: "drop-shadow(0 2px 4px rgba(0,0,0,0.35))",
      }}
    />
  );
}

Object.assign(window, { EdinunLogo, EdinunLogoMini });

// characters.jsx — Personajes 3D estilizados para EDINUN GAMES.
// Cada uno es un SVG con gradientes radiales + sombras para simular volumen.
// No son ilustraciones finales — son placeholders pulidos que el equipo de
// arte 3D puede reemplazar manteniendo la composición.

// ─────────────────────────────────────────────────────────────
// Defs reutilizables — gradientes y sombras comunes a varios personajes
// ─────────────────────────────────────────────────────────────
function CharDefs({ id }) {
  return (
    <defs>
      {/* Piel con volumen */}
      <radialGradient id={`${id}-skin`} cx="35%" cy="30%" r="75%">
        <stop offset="0%" stopColor="#ffe2c0" />
        <stop offset="55%" stopColor="#f4c59a" />
        <stop offset="100%" stopColor="#b88156" />
      </radialGradient>
      {/* Piel más oscura */}
      <radialGradient id={`${id}-skin-dark`} cx="35%" cy="30%" r="75%">
        <stop offset="0%" stopColor="#d9a683" />
        <stop offset="55%" stopColor="#a77249" />
        <stop offset="100%" stopColor="#5e3e24" />
      </radialGradient>
      {/* Barba / cabello blanco */}
      <radialGradient id={`${id}-white-hair`} cx="45%" cy="30%" r="75%">
        <stop offset="0%" stopColor="#ffffff" />
        <stop offset="60%" stopColor="#dce1ef" />
        <stop offset="100%" stopColor="#8892b3" />
      </radialGradient>
      {/* Brillo general */}
      <radialGradient id={`${id}-shine`} cx="30%" cy="20%" r="50%">
        <stop offset="0%" stopColor="rgba(255,255,255,0.8)" />
        <stop offset="100%" stopColor="rgba(255,255,255,0)" />
      </radialGradient>
      <filter id={`${id}-soft`} x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="0.6" />
      </filter>
      <filter id={`${id}-shadow`} x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="4" stdDeviation="6" floodColor="#000" floodOpacity="0.35" />
      </filter>
    </defs>
  );
}

// Estrellas / chispas alrededor del personaje
function Sparkles({ color = "#fce9a8", count = 6, seed = 1 }) {
  const pts = Array.from({ length: count }, (_, i) => {
    const a = (i * 360) / count + seed * 37;
    const r = 55 + (i % 3) * 8;
    const x = 100 + Math.cos((a * Math.PI) / 180) * r;
    const y = 100 + Math.sin((a * Math.PI) / 180) * r;
    const s = 2 + (i % 3);
    return { x, y, s, delay: i * 0.35 };
  });
  return (
    <g>
      {pts.map((p, i) => (
        <g key={i} transform={`translate(${p.x} ${p.y})`}>
          <circle r={p.s} fill={color} opacity="0.9">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin={`${p.delay}s`} repeatCount="indefinite" />
          </circle>
        </g>
      ))}
    </g>
  );
}

// ─────────────────────────────────────────────────────────────
// Visitor ticker — valor persistente en localStorage que se incrementa
// al entrar. Útil para dar sensación de "contador público" sin backend.
// ─────────────────────────────────────────────────────────────
// Contador de partidas completadas (persistente en localStorage).
// Se incrementa al terminar cada juego. Pensado para servidores estáticos
// sin backend — sólo HTML + localStorage del navegador.
// Contador de VISITANTES ─────────────────────────────────────
// Suma +1 cada vez que se monta HomeScreen (cada entrada al inicio cuenta,
// incluso múltiples veces en el mismo dispositivo). El total vive en
// localStorage y persiste entre sesiones. Pensado para servidores estáticos
// sin backend.
function useVisitorCount() {
  const [n, setN] = useState(0);
  useEffect(() => {
    const KEY = "edinun_visitors_v1";
    let current = parseInt(localStorage.getItem(KEY) || "0", 10);
    if (isNaN(current)) current = 0;
    current += 1;
    localStorage.setItem(KEY, String(current));
    setN(current);
  }, []);
  return n;
}

      <path d="M14 20c0-2 -.7-3.8-1.8-5.2 1-.5 2.1-.8 3.3-.8 3.3 0 6 2.7 6 6v1H14v-1z" fill={color} opacity="0.85" />

function incrementGamesCompleted() {
  const KEY = "edinun_games_completed_v1";
  const raw = localStorage.getItem(KEY);
  const next = (raw ? parseInt(raw, 10) : 0) + 1;
  localStorage.setItem(KEY, String(next));
  window.dispatchEvent(new Event("edinun:games-updated"));
  return next;
}

          >
            {/* halo tono */}
            <div style={{
              position: "absolute", inset: -20,
              background: `radial-gradient(circle at 30% 0%, ${cat.tone}44, transparent 55%)`,
              pointerEvents: "none",

            <div style={{ position: "relative", display: "flex", alignItems: "flex-start", justifyContent: "space-between" }}>
              <div className={`ed-chip ed-chip-${cat.level}`} style={{ fontSize: 10, padding: "2px 8px" }}>
                {cat.level === "basic" ? "Básico" : cat.level === "medium" ? "Medio" : "Avanzado"}
              </div>
              {cat.locked && <div style={{ fontSize: 18 }}>🔒</div>}
            </div>
            <div style={{
              position: "relative",
              fontFamily: "var(--ed-font-display)",
              fontWeight: 600,
              fontSize: 58,
              lineHeight: 1,
              color: cat.tone,
              textShadow: `0 0 20px ${cat.tone}66, 0 3px 0 rgba(0,0,0,0.3)`,
              textAlign: "center",
              margin: "8px 0",
            }}>
              {cat.emoji}
            </div>
            <div style={{ position: "relative" }}>
              <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 16, marginBottom: 6 }}>
                {cat.name}
              </div>
              <div style={{ height: 5, background: "rgba(255,255,255,0.12)", borderRadius: 999, overflow: "hidden" }}>
                <div style={{
                  width: `${Math.round(cat.prog * 100)}%`,
                  height: "100%",
                  background: `linear-gradient(90deg, ${cat.tone}, #fff)`,
                }} />
              </div>
              <div className="ed-label" style={{ fontSize: 10, marginTop: 4, color: "rgba(246,241,255,0.55)" }}>
                {cat.locked ? "Pensum superior" : `${Math.round(cat.prog * 100)}% completado`}
              </div>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

// game-screens.jsx — Juego, resultados, perfil.

const { useState: useStateG, useEffect: useEffectG, useRef: useRefG, useMemo: useMemoG } = React;

// ─────────────────────────────────────────────────────────────
// Generador de problemas por categoría
// ─────────────────────────────────────────────────────────────
function makeProblem(cat) {
  const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
  switch (cat) {
    case "suma": {
      const a = rand(12, 89), b = rand(10, 99);
      return { a, b, op: "+", answer: a + b };
    }
    case "resta": {
      let a = rand(50, 999), b = rand(10, 499);
      if (b > a) [a, b] = [b, a];
      return { a, b, op: "−", answer: a - b };
    }
    case "mult": {
      const a = rand(2, 12), b = rand(2, 9);
      return { a, b, op: "×", answer: a * b };
    }
    case "div": {
      const b = rand(2, 9);
      const ans = rand(2, 12);
      return { a: b * ans, b, op: "÷", answer: ans };
    }
    case "frac":
      return { a: 1, b: 2, op: "+", answer: 3, frac: true };
    default: {
      const a = rand(10, 99), b = rand(10, 99);
      return { a, b, op: "+", answer: a + b };
    }
  }
}

function digits(n) {
  return String(n).split("");
}

// ─────────────────────────────────────────────────────────────
// PANTALLA DE JUEGO — pizarra estilo referencia pero cósmica
// ─────────────────────────────────────────────────────────────
// Frases motivadoras matemáticas para cuando el estudiante se equivoca
// (no se repite el ejercicio; el feedback acompaña con carisma).
const ENCOURAGEMENTS = [
  "¡Casi! Sigue intentándolo.",
  "Los números no muerden 🔢",
  "¡La próxima es tuya!",
  "Equivocarse también es aprender.",
  "Las matemáticas son una aventura.",
  "¡Vamos al siguiente reto!",
  "Cada error te acerca al acierto.",
];

function GameScreen({ app, setApp, go }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const cat = app.currentCategory || "suma";
  const catLabel = app.currentCatLabel || "Sumas";

  const [problem, setProblem] = useStateG(() => makeProblem(cat));
  const [answer, setAnswer] = useStateG([]);
  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(app.stars || 48);
  const [streak, setStreak] = useStateG(0);
  const [maxStreak, setMaxStreak] = useStateG(0);
  const [solved, setSolved] = useStateG(0);       // aciertos en la sesión
  const [attempted, setAttempted] = useStateG(0); // ejercicios intentados (correctos o no)
  const [starsSession, setStarsSession] = useStateG(0); // estrellas ganadas en la sesión actual
  const [feedback, setFeedback] = useStateG(null); // 'ok' | 'err' | null
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [hintOn, setHintOn] = useStateG(false);
  // Cambio de nivel desde los tabs del HUD: guarda el nivel propuesto
  // mientras se muestra el modal de confirmación. null = sin modal.
  const [pendingLevel, setPendingLevel] = useStateG(null);
  // Modal de confirmación para rendirse y ver resultados parciales.
  const [confirmingSurrender, setConfirmingSurrender] = useStateG(false);
  // Log de ejercicios de la ronda — alimenta el reporte académico de
  // ResultsScreen. Cada entrada: {idx, a, b, op, correctAnswer, userAnswer,
  // isCorrect, time, earned}.
  const [log, setLog] = useStateG([]);

  const slots = digits(problem.answer).length;
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  // Cronómetro total
  useEffectG(() => {
    const id = setInterval(() => {
      setElapsed(Math.floor((Date.now() - started.current) / 1000));
    }, 500);
    return () => clearInterval(id);
  }, []);

  // answer es un array alineado con la operación — answer[0] es la más
  // significativa (centena), answer[slots-1] es la unidad. Se llena de
  // derecha a izquierda: primero unidades, luego decenas, luego centenas.
  function press(d) {
    setAnswer((prev) => {
      const next = [...prev];
      while (next.length < slots) next.push(undefined);
      // Buscar de derecha a izquierda el primer slot vacío
      for (let i = slots - 1; i >= 0; i--) {
        if (next[i] === undefined) { next[i] = d; return next; }
      }
      return prev; // todos llenos
    });
  }
  function eraseAt(i) {
    setAnswer((prev) => {
      const next = [...prev];
      while (next.length < slots) next.push(undefined);
      next[i] = undefined;
      return next;
    });
  }
  function erase() {
    // Borra el último dígito colocado (el de más a la izquierda entre los llenos)
    setAnswer((prev) => {
      const next = [...prev];
      while (next.length < slots) next.push(undefined);
      for (let i = 0; i < slots; i++) {
        if (next[i] !== undefined) { next[i] = undefined; return next; }
      }
      return next;
    });
  }
  function verify() {
    const filled = Array.from({ length: slots }, (_, i) => answer[i]);
    if (filled.some(d => d === undefined || d === "")) {
      // Faltan dígitos: feedback de error suave (no consume intento)
      setFeedback("err");
      setFeedbackMsg("Completa todos los casilleros");
      setTimeout(() => { setFeedback(null); setFeedbackMsg(""); }, 700);
      return;
    }
    const joined = filled.join("");
    const entered = parseInt(joined, 10);
    const isCorrect = entered === problem.answer;
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    // Estrellas por ejercicio: máximo 10, decrece con el tiempo. <3s → 10, +3s cada vez.
    const earned = isCorrect ? Math.max(1, 10 - Math.floor(exerciseSec / 3)) : 0;

    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStreak = isCorrect ? streak + 1 : 0;
    const newMaxStreak = Math.max(maxStreak, newStreak);
    const newStarsSession = starsSession + earned;
    const newStarsTotal = stars + earned;

    const entry = {
      idx: newAttempted,
      a: problem.a,
      b: problem.b,
      op: problem.op,
      correctAnswer: problem.answer,
      userAnswer: entered,
      isCorrect,
      time: exerciseSec,
      earned,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect
      ? `+${earned} ⭐`
      : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]
    );
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStreak(newStreak);
    setMaxStreak(newMaxStreak);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 950 : 1200;
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      setAnswer([]);
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s,
          stars: newStarsTotal,
          lastResult: {
            category: catLabel,
            solved: newSolved,
            total: 3,
            time: elapsed,
            streak: newMaxStreak,
            starsEarned: newStarsSession,
            log: newLog,
          },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setProblem(makeProblem(cat));
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  // Aplica un cambio de nivel desde los tabs: deriva nueva categoría,
  // regenera problema y resetea ronda (intentos/aciertos/cronómetro).
  // No navega — sigue en la pantalla de juego.
  function applyLevelChange(newLevel) {
    let catId = "suma", catLabel = "Sumas";
    if (newLevel === "basic") {
      const pick = Math.random() < 0.5 ? ["suma", "Sumas"] : ["resta", "Restas"];
      catId = pick[0]; catLabel = pick[1];
    } else if (newLevel === "medium") {
      catId = "mult"; catLabel = "Multiplicaciones";
    } else if (newLevel === "advanced") {
      catId = "div"; catLabel = "Divisiones";
    }
    setApp((s) => ({ ...s, level: newLevel, currentCategory: catId, currentCatLabel: catLabel }));
    setProblem(makeProblem(catId));
    setAnswer([]);
    setSolved(0);
    setAttempted(0);
    setStreak(0);
    setMaxStreak(0);
    setStarsSession(0);
    setLog([]);
    setFeedback(null);
    setFeedbackMsg("");
    started.current = Date.now();
    exerciseStart.current = Date.now();
    setElapsed(0);
  }

  // Rendirse: cierra la ronda con lo que haya hasta ahora y navega a
  // resultados. El reporte mostrará solo los ejercicios intentados.
  function surrender() {
    setApp((s) => ({
      ...s,
      stars,
      lastResult: {
        category: catLabel,
        solved,
        total: 3,
        time: elapsed,
        streak: maxStreak,
        starsEarned: starsSession,
        log,
        surrendered: true,
      },
    }));
    go("results");
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return `${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
  }

  const aDigits = digits(problem.a);
  const bDigits = digits(problem.b);
  const maxLen = Math.max(aDigits.length, bDigits.length);
  const padA = Array(maxLen - aDigits.length).fill(" ").concat(aDigits);
  const padB = Array(maxLen - bDigits.length).fill(" ").concat(bDigits);

  const levelOfCat = CATEGORIES.find((c) => c.id === cat)?.level || "basic";

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>


      {/* Top HUD */}
      <div style={{ position: "absolute", top: 10, left: 16, right: 16, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
        {/* Izq: logo limpio (sin wrapper). El cambio de nivel se hace
            tocando los tabs Básico/Medio/Avanzado de abajo, con modal de
            confirmación. */}
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <EdinunLogoMini size={56} />
        </div>

        {/* Centro: barra de niveles — clickeable. Tocar un nivel distinto al
            actual abre un modal de confirmación; aceptar reinicia la ronda
            con la dificultad nueva. */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, maxWidth: 440, justifyContent: "center" }}>
          {[
            { id: "basic", label: "Básico", c: "#f5a623" },
            { id: "medium", label: "Medio", c: "#f5d84b" },
            { id: "advanced", label: "Avanzado", c: "#4fa0ff" },
          ].map((lv) => {
            const active = lv.id === levelOfCat;
            return (
              <button
                key={lv.id}
                onClick={() => { if (!active) setPendingLevel(lv.id); }}
                disabled={active}
                style={{
                  padding: "6px 14px", borderRadius: 999,
                  background: active ? lv.c : "rgba(255,255,255,0.15)",
                  color: active ? "#0b3a2d" : "rgba(255,255,255,0.85)",
                  fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 13,
                  border: active ? `2px solid ${lv.c}` : "2px solid transparent",
                  boxShadow: active ? `0 0 14px ${lv.c}88` : "none",
                  cursor: active ? "default" : "pointer",
                  transition: "background 0.15s ease, transform 0.1s ease",
                }}
              >
                {lv.label}
              </button>
            );
          })}
        </div>

        {/* Der: stats */}
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{
            display: "flex", alignItems: "center", gap: 6,
            background: "rgba(0,0,0,0.35)", borderRadius: 999, padding: "6px 12px",
            border: "1px solid rgba(242,194,96,0.4)", fontFamily: "var(--ed-font-mono)", fontSize: 13, color: "#fce9a8",
          }}>
            ⏱ {formatTime(elapsed)}
          </div>
          <div style={{
            display: "flex", alignItems: "center", gap: 6,
            background: "rgba(0,0,0,0.35)", borderRadius: 999, padding: "6px 12px",
            border: "1px solid rgba(242,194,96,0.4)", fontFamily: "var(--ed-font-display)", fontWeight: 600, color: "#fce9a8",
          }}>
            ⭐ {stars}
          </div>
        </div>
      </div>

      {/* Personaje compañero — lado izquierdo, elevado para no chocar con el
          numpad. Cuando hay feedback de error, muestra un bocadillo con frase
          motivadora (`feedbackMsg`). */}
      <div style={{
        position: "absolute", left: 8, bottom: 90, width: 220,
        pointerEvents: "none", textAlign: "center",
      }}>
        {/* Bocadillo motivador (visible solo en feedback de error con texto) */}
        {feedback === "err" && feedbackMsg && (
          <div style={{
            position: "absolute", left: 160, bottom: 150,
            background: "rgba(255,255,255,0.96)",
            color: "#1a3a2d",
            fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 13,
            padding: "8px 14px", borderRadius: 16,
            maxWidth: 220, lineHeight: 1.25,
            boxShadow: "0 8px 22px rgba(0,0,0,0.35), 0 0 0 2px rgba(242,194,96,0.55)",
            animation: "ed-pop-in 0.25s",
          }}>
            <div style={{
              position: "absolute", left: -8, bottom: 14,
              width: 0, height: 0,
              borderTop: "8px solid transparent",
              borderBottom: "8px solid transparent",
              borderRight: "10px solid rgba(255,255,255,0.96)",
            }} />
            {feedbackMsg}
          </div>
        )}
        <div style={{ position: "relative", display: "flex", justifyContent: "center" }}>
          <div style={{
            position: "absolute", bottom: 0, left: "50%", transform: "translateX(-50%)",
            width: 150, height: 18, borderRadius: "50%",
            background: "radial-gradient(ellipse, rgba(242,194,96,0.45), transparent 70%)",
            filter: "blur(5px)",
          }} />
          <char.Component size={200} floating />
        </div>
        <div style={{
          marginTop: -4,
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14,
          color: "#fce9a8", letterSpacing: "0.04em",
          textShadow: "0 2px 6px rgba(0,0,0,0.6)",
        }}>{char.name}</div>
      </div>

      {/* Racha / progreso — separado del HUD para que no se pegue a los tabs de nivel */}
      <div style={{
        position: "absolute", top: 78, left: "50%", transform: "translateX(-50%)",
        display: "flex", alignItems: "center", gap: 8,
      }}>
        <span className="ed-label" style={{ color: "rgba(255,255,255,0.7)" }}>Ronda</span>
        {[0,1,2].map((i) => (
          <div key={i} style={{
            width: 10, height: 10, borderRadius: "50%",
            background: i < attempted ? (i < solved ? "#fce9a8" : "#ff6b6b") : "rgba(255,255,255,0.2)",
            boxShadow: i < attempted ? "0 0 10px currentColor" : "none",
            color: i < solved ? "#fce9a8" : "#ff6b6b",
          }} />
        ))}
      </div>

      {/* ══════ ECUACIÓN PROTAGONISTA ══════
          Centrada en la pantalla, ocupa el espacio principal.
          Columnas CDU alineadas verticalmente. Los slots quedan
          debajo de la línea divisoria, directamente bajo las columnas. */}
      {(() => {
        const DIGIT_W = 54;     // ancho de cada columna (número/slot)
        const GAP = 10;         // gap entre columnas
        const OP_W = 44;        // ancho de la celda del operador
        // CRÍTICO: el número de columnas debe cubrir tanto los operandos
        // como el resultado. Si slots > maxLen (ej. 59+74=133 → 3 slots, maxLen=2),
        // ampliamos el grid y padeamos los operandos a la izquierda con celdas vacías.
        const columns = Math.max(maxLen, slots);
        const TOTAL_W = OP_W + columns * DIGIT_W + columns * GAP;
        // Etiquetas CDU siempre alineadas desde la derecha (unidades siempre a la derecha)
        const labels = ["C","D","U"].slice(3 - columns);
        // Padding de operandos a la izquierda para alinear por la derecha con el grid total
        const leftPadA = Array(columns - padA.length).fill(" ");
        const leftPadB = Array(columns - padB.length).fill(" ");
        const fullA = leftPadA.concat(padA);
        const fullB = leftPadB.concat(padB);
        return (
          <div style={{
            position: "absolute", top: 104, left: "50%", transform: "translateX(-50%)",
            textAlign: "center", width: TOTAL_W,
          }}>
            <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 15, color: "rgba(255,255,255,0.9)", marginBottom: 8 }}>
              Resuelve la siguiente operación:
            </div>

            {/* Encabezado C D U — alineado sobre las columnas de dígitos */}
            <div style={{
              display: "grid",
              gridTemplateColumns: `${OP_W}px repeat(${columns}, ${DIGIT_W}px)`,
              gap: GAP, justifyContent: "center", alignItems: "center",
              marginBottom: 6,
            }}>
              <span />
              {labels.map((lb) => (
                <div key={lb} className={`ed-dice ed-dice-${lb.toLowerCase()}`} style={{ width: 32, height: 32, fontSize: 16, margin: "0 auto" }}>
                  {lb}
                </div>
              ))}
            </div>

            {/* Fila A */}
            <div style={{
              display: "grid",
              gridTemplateColumns: `${OP_W}px repeat(${columns}, ${DIGIT_W}px)`,
              gap: GAP, justifyContent: "center", alignItems: "center",
              fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 54, color: "#fff",
              lineHeight: 1,
            }}>
              <span />
              {fullA.map((d, i) => <span key={`a${i}`}>{d}</span>)}
            </div>

            {/* Fila B con operador */}
            <div style={{
              display: "grid",
              gridTemplateColumns: `${OP_W}px repeat(${columns}, ${DIGIT_W}px)`,
              gap: GAP, justifyContent: "center", alignItems: "center",
              fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 54, color: "#fff",
              lineHeight: 1, marginTop: 2,
            }}>
              <span style={{ textAlign: "center" }}>{problem.op}</span>
              {fullB.map((d, i) => <span key={`b${i}`}>{d}</span>)}
            </div>

            {/* Línea divisoria */}
            <div style={{
              height: 4, background: "#fff", borderRadius: 2,
              margin: "8px auto 10px", width: TOTAL_W - 12,
              boxShadow: "0 0 10px rgba(255,255,255,0.35)",
            }} />

            {/* Slots de respuesta — alineados bajo las columnas CDU (derecha) */}
            <div style={{
              display: "grid",
              gridTemplateColumns: `${OP_W}px repeat(${columns}, ${DIGIT_W}px)`,
              gap: GAP, justifyContent: "center", alignItems: "center",
            }}>
              <span />
              {/* Padding izquierdo vacío para empujar slots a la derecha */}
              {Array.from({ length: columns - slots }).map((_, k) => <span key={`pad${k}`} />)}
              {Array.from({ length: slots }).map((_, i) => {
                const d = answer[i];
                const filled = d !== undefined && d !== "";
                // El slot "activo" es el más a la derecha que esté vacío (U→D→C)
                let activeIdx = -1;
                for (let k = slots - 1; k >= 0; k--) {
                  if (answer[k] === undefined || answer[k] === "") { activeIdx = k; break; }
                }
                const isActive = i === activeIdx;
                return (
                  <div
                    key={i}
                    className={`ed-answer-slot ${isActive ? "active" : ""} ${filled ? "filled" : ""}`}
                    draggable={filled}
                    onDragStart={(e) => {
                      if (!filled) return;
                      e.dataTransfer.setData("text/plain", `s:${i}:${d}`);
                      e.dataTransfer.effectAllowed = "move";
                      e.currentTarget.classList.add("dragging");
                    }}
                    onDragEnd={(e) => e.currentTarget.classList.remove("dragging")}
                    onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add("drag-over"); }}
                    onDragLeave={(e) => e.currentTarget.classList.remove("drag-over")}
                    onDrop={(e) => {
                      e.preventDefault();
                      e.currentTarget.classList.remove("drag-over");
                      const data = e.dataTransfer.getData("text/plain");
                      if (!data) return;
                      setAnswer((prev) => {
                        const next = [...prev];
                        while (next.length < slots) next.push(undefined);
                        if (data.startsWith("s:")) {
                          // Intercambio entre slots: s:<srcIdx>:<digit>
                          const parts = data.split(":");
                          const srcIdx = parseInt(parts[1], 10);
                          const srcDigit = parts.slice(2).join(":");
                          if (Number.isNaN(srcIdx) || srcIdx === i) return next;
                          const here = next[i];
                          next[i] = srcDigit;
                          next[srcIdx] = here; // queda undefined si el destino estaba vacío
                        } else if (data.startsWith("n:")) {
                          // Desde el numpad: n:<digit>
                          next[i] = data.slice(2);
                        } else {
                          // Compatibilidad: tratar como dígito directo
                          next[i] = data;
                        }
                        return next;
                      });
                    }}
                    onClick={() => { if (filled) eraseAt(i); }}
                    title={filled ? "Toca para borrar · arrastra para mover/intercambiar" : "Arrastra un número aquí"}
                    style={{
                      width: DIGIT_W, height: 62, fontSize: 36,
                      margin: "0 auto",
                      borderColor: feedback === "ok" ? "#2ecc8f" : feedback === "err" ? "#ff6b6b" : undefined,
                      boxShadow: feedback === "ok"
                        ? "0 0 18px rgba(46,204,143,0.65)"
                        : feedback === "err"
                          ? "0 0 18px rgba(255,107,107,0.65)"
                          : undefined,
                      color: "#fff",
                      cursor: filled ? "grab" : "default",
                    }}
                  >
                    {filled ? d : ""}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* Fichas arrastrables — fila inferior centrada */}
      <div style={{
        position: "absolute", bottom: 18, left: "50%", transform: "translateX(-50%)",
        display: "grid", gridTemplateColumns: "repeat(10, 48px)", gap: 8,
      }}>
        {["1","2","3","4","5","6","7","8","9","0"].map((d, i) => {
          const color = ["#ef5a5a","#f5a623","#f5d84b","#4fa0ff","#2ecc8f"][i % 5];
          return (
            <button
              key={d}
              className="ed-numpad-key ed-draggable"
              draggable="true"
              onDragStart={(e) => {
                e.dataTransfer.setData("text/plain", `n:${d}`);
                e.dataTransfer.effectAllowed = "copy";
                e.currentTarget.classList.add("dragging");
              }}
              onDragEnd={(e) => e.currentTarget.classList.remove("dragging")}
              onClick={() => press(d)}
              style={{
                height: 52, fontSize: 22,
                borderColor: color,
                borderWidth: 2, borderStyle: "solid",
                cursor: "grab",
              }}
              title="Arrastra al casillero o toca para colocar"
            >
              {d}
            </button>
          );
        })}
      </div>

      {/* Botones de acción — columna derecha, centrados verticalmente */}
      <div style={{
        position: "absolute", right: 18, top: "50%", transform: "translateY(-50%)",
        display: "flex", flexDirection: "column", gap: 12, width: 140,
      }}>
        <button
          className="ed-btn ed-btn-verify"
          onClick={verify}
          style={{ fontSize: 16, padding: "14px 10px", height: 66, fontWeight: 800, letterSpacing: "0.04em" }}
        >
          ¡VERIFICAR!
        </button>
        <button
          className="ed-btn ed-btn-erase"
          onClick={erase}
          style={{ fontSize: 15, padding: "12px 10px", height: 52, fontWeight: 700 }}
        >
          Borrar 🗑
        </button>
        <button
          className="ed-btn ed-btn-ghost"
          onClick={() => setConfirmingSurrender(true)}
          title="Terminar la ronda y ver los resultados parciales"
          style={{ fontSize: 13, padding: "10px 8px", height: 40, fontWeight: 600 }}
        >
          Rendirse
        </button>
      </div>

      {/* Feedback overlay — al acertar muestra estrellas; al fallar deja al
          personaje hablar (bocadillo abajo a la izquierda). */}
      {feedback && (
        <div style={{
          position: "absolute", inset: 0, pointerEvents: "none",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          gap: 8,
          animation: "ed-pop-in 0.3s",
        }}>
          <div style={{
            fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 72,
            color: feedback === "ok" ? "#2ecc8f" : "#ff6b6b",
            textShadow: "0 4px 0 rgba(0,0,0,0.35), 0 0 40px currentColor",
          }}>
            {feedback === "ok" ? "¡EXCELENTE!" : "¡UPS!"}
          </div>
          {feedback === "ok" && feedbackMsg && (
            <div style={{
              fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 28,
              color: "#fce9a8",
              background: "rgba(0,0,0,0.5)",
              padding: "6px 22px", borderRadius: 999,
              textShadow: "0 2px 6px rgba(0,0,0,0.6)",
            }}>
              {feedbackMsg}
            </div>
          )}
        </div>
      )}

      {/* Modal de confirmación de rendirse */}
      {confirmingSurrender && (
        <div
          onClick={() => setConfirmingSurrender(false)}
          style={{
            position: "absolute", inset: 0, zIndex: 50,
            background: "rgba(0,0,0,0.55)",
            backdropFilter: "blur(4px)",
            display: "flex", alignItems: "center", justifyContent: "center",
            animation: "ed-pop-in 0.18s",
          }}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            className="ed-card"
            style={{ padding: 24, maxWidth: 440, textAlign: "center", boxShadow: "var(--ed-shadow-card), 0 0 40px rgba(255,107,107,0.3)" }}
          >
            <div className="ed-label" style={{ color: "#ff8b8b", marginBottom: 6 }}>
              Terminar ronda
            </div>
            <h2 className="ed-h1" style={{ fontSize: 22, lineHeight: 1.15, marginBottom: 8 }}>
              ¿Rendirte ahora?
            </h2>
            <p className="ed-body" style={{ marginBottom: 16, fontSize: 14 }}>
              Vas a ver el reporte con los ejercicios que llevas resueltos hasta ahora ({attempted}/3). No podrás retomar esta ronda.
            </p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <button className="ed-btn ed-btn-ghost" onClick={() => setConfirmingSurrender(false)} style={{ height: 44 }}>
                Seguir jugando
              </button>
              <button className="ed-btn ed-btn-primary" onClick={() => { setConfirmingSurrender(false); surrender(); }} style={{ height: 44 }}>
                Sí, ver resultados
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Modal de confirmación de cambio de nivel desde los tabs */}
      {pendingLevel && (() => {
        const labels = { basic: "Básico", medium: "Medio", advanced: "Avanzado" };
        const colors = { basic: "#f5a623", medium: "#f5d84b", advanced: "#4fa0ff" };
        return (
          <div
            onClick={() => setPendingLevel(null)}
            style={{
              position: "absolute", inset: 0, zIndex: 50,
              background: "rgba(0,0,0,0.55)",
              backdropFilter: "blur(4px)",
              display: "flex", alignItems: "center", justifyContent: "center",
              animation: "ed-pop-in 0.18s",
            }}
          >
            <div
              onClick={(e) => e.stopPropagation()}
              className="ed-card"
              style={{
                padding: 24, maxWidth: 440, textAlign: "center",
                boxShadow: "var(--ed-shadow-card), 0 0 40px rgba(242,194,96,0.35)",
              }}
            >
              <div className="ed-label" style={{ color: "#fce9a8", marginBottom: 6 }}>
                Cambiar dificultad
              </div>
              <h2 className="ed-h1" style={{ fontSize: 22, lineHeight: 1.15, marginBottom: 8 }}>
                ¿Cambiar a <span style={{ color: colors[pendingLevel] }}>{labels[pendingLevel]}</span>?
              </h2>
              <p className="ed-body" style={{ marginBottom: 16, fontSize: 14 }}>
                Vas a reiniciar la ronda actual. Perderás el progreso de los
                ejercicios resueltos hasta ahora en esta sesión.
              </p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <button
                  className="ed-btn ed-btn-ghost"
                  onClick={() => setPendingLevel(null)}
                  style={{ height: 44 }}
                >
                  Cancelar
                </button>
                <button
                  className="ed-btn ed-btn-primary"
                  onClick={() => { applyLevelChange(pendingLevel); setPendingLevel(null); }}
                  style={{ height: 44 }}
                >
                  Sí, cambiar
                </button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// Formatea una operación de ejercicio sin emojis ni signos UI: "23 + 45".
function formatOp(e) {
  return `${e.a} ${e.op} ${e.b}`;
}

function ReportField({ label, value }) {
  return (
    <div style={{
      padding: "8px 10px", borderRadius: 10,

      <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 14, color: "var(--ed-ink)" }}>{value}</div>

function SummaryCell({ label, value, tone = "var(--ed-ink)", emphasis = false }) {
  return (
    <div style={{
      padding: "8px 10px", borderRadius: 10,

}

function Stat({ label, value, tone }) {

    </div>
  );
}

                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { GameScreen, ResultsScreen });

// app.jsx — Shell de producción EDINUN GAMES.
// Enrutador por estado y device stage adaptativo (desktop / tablet / mobile).
// Móvil portrait: el contenido NUNCA rota; queda letterboxed y obliga al
// usuario a rotar físicamente el teléfono.

const { useState: useStateA, useEffect: useEffectA } = React;

// ─────────────────────────────────────────────────────────────
// DeviceStage — escala el lienzo lógico 900×540 (paisaje) al viewport.
//
// Reglas:
//   · Desktop / tablet: marco redondeado + notch decorativo, padding cómodo.
//   · Mobile (cualquier orientación): sin marco, sin notch, padding mínimo.
//   · Mobile portrait: scale es pequeño y se ve "horizontal apretado".
//     Eso es intencional — el usuario debe girar el teléfono. Mostramos un
//     hint discreto, no bloqueante.
// ─────────────────────────────────────────────────────────────
function DeviceStage({ children, variant = "cosmic" }) {
  const W = 900, H = 540;
  const [scale, setScale] = useStateA(1);
  const [mode, setMode] = useStateA("desktop");
  const [portrait, setPortrait] = useStateA(false);

  useEffectA(() => {
    function onResize() {
      const vw = window.innerWidth, vh = window.innerHeight;
      const minSide = Math.min(vw, vh);
      const maxSide = Math.max(vw, vh);

      let m = "desktop";
      if (maxSide < 820) m = "mobile";
      else if (minSide < 820) m = "tablet";

      const isPortrait = vh > vw;
      setMode(m);
      setPortrait(isPortrait);

      const s = Math.min(vw / W, vh / H);
      setScale(Math.max(s, 0.15));
    }
    onResize();
    window.addEventListener("resize", onResize);
    window.addEventListener("orientationchange", onResize);
    return () => {
      window.removeEventListener("resize", onResize);
      window.removeEventListener("orientationchange", onResize);
    };
  }, []);

  const showRotateHint = mode === "mobile" && portrait;

  return (
    <div style={{
      width: "100vw", height: "100vh",
      overflow: "hidden",
      position: "fixed", inset: 0,
      background: variant === "chalkboard" ? "#0b3a2d" : "#050214",
    }}>
      {/* Fondo cósmico/pizarra al viewport completo — los glifos matemáticos
          flotan sobre toda la pantalla y se ven uniformes en cualquier resolución. */}
      <CosmosBg variant={variant} />

      {/* Lienzo lógico 900×540 centrado y escalado */}
      <div style={{
        position: "absolute", inset: 0,
        display: "grid", placeItems: "center",
      }}>
        <div style={{
          width: W, height: H,
          transform: `scale(${scale})`, transformOrigin: "center center",
          position: "relative",
          overflow: "hidden",
        }}>
          {children}
        </div>
      </div>

      {showRotateHint && <RotateHint />}
    </div>
  );
}

// Hint discreto de rotación — no bloquea el contenido, solo sugiere girar.
// Aparece solo en móvil portrait. Se puede ocultar tocándolo.
function RotateHint() {
  const [hidden, setHidden] = useStateA(false);
  if (hidden) return null;
  return (
    <button
      onClick={() => setHidden(true)}
      style={{
        position: "fixed", left: "50%", bottom: 14, transform: "translateX(-50%)",
        zIndex: 9999,
        display: "flex", alignItems: "center", gap: 8,
        background: "rgba(10,6,35,0.85)",
        border: "1px solid rgba(242,194,96,0.4)",
        borderRadius: 999, padding: "8px 14px",
        color: "#fce9a8",
        fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 13,
        backdropFilter: "blur(8px)",
        boxShadow: "0 8px 20px rgba(0,0,0,0.45)",
      }}
      aria-label="Gira tu dispositivo para ver mejor"
    >
      <span style={{ display: "inline-block", animation: "ed-rotate-hint 2.4s ease-in-out infinite" }}>↻</span>
      Gira tu dispositivo
      <style>{`
        @keyframes ed-rotate-hint {
          0%, 100% { transform: rotate(0deg); }
          50% { transform: rotate(90deg); }
        }
      `}</style>
    </button>
  );
}

// ─────────────────────────────────────────────────────────────
// App principal
// ─────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useStateA("home");
  const [app, setApp] = useStateA({
    studentName: "",
    character: "mago",
    level: "basic",
    stars: 48,
    sessionStart: Date.now(),
    gameSeed: 0,
  });

  function go(r) {
    // Al (re)entrar al juego, regeneramos la seed para que GameScreen se remonte
    // y reinicie ronda, tiempo, racha, etc.
    if (r === "game") {
      setApp((s) => ({ ...s, gameSeed: (s.gameSeed || 0) + 1 }));
    }
    setRoute(r);
  }

  const screenProps = { app, setApp, go };

  let Screen = window.HomeScreen;
  if (route === "character") Screen = window.CharacterScreen;
  else if (route === "game") Screen = window.GameScreen;
  else if (route === "results") Screen = window.ResultsScreen;

  const variant = route === "game" ? "chalkboard" : "cosmic";

  return (
    <DeviceStage variant={variant}>
      <Screen key={route === "game" ? `game-${app.gameSeed}` : route} {...screenProps} />
    </DeviceStage>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
