// characters.jsx — Personajes EDINUN GAMES.
// Renderizan los PNG de assets/char-<id>.png generados con Nano Banana.
// El componente expone la misma API que la versión SVG anterior
// (props `size`, `floating`) para no romper a los consumidores
// (GameScreen, CharacterScreen, ResultsScreen, ProfileScreen, CharacterAvatar).

// ─────────────────────────────────────────────────────────────
// Sparkles — chispas animadas alrededor del personaje. Sobreviven de
// la versión SVG porque dan vida y refuerzan la estética cósmica.
// ─────────────────────────────────────────────────────────────
function Sparkles({ color = "#fce9a8", count = 6, seed = 1 }) {
  const pts = Array.from({ length: count }, (_, i) => {
    const a = (i * 360) / count + seed * 37;
    const r = 70 + (i % 3) * 8;
    const x = 100 + Math.cos((a * Math.PI) / 180) * r;
    const y = 100 + Math.sin((a * Math.PI) / 180) * r;
    const s = 2 + (i % 3);
    return { x, y, s, delay: i * 0.35 };
  });
  return (
    <g>
      {pts.map((p, i) => (
        <g key={i} transform={`translate(${p.x} ${p.y})`}>
          <circle r={p.s} fill={color} opacity="0.9">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin={`${p.delay}s`} repeatCount="indefinite" />
          </circle>
        </g>
      ))}
    </g>
  );
}

// ─────────────────────────────────────────────────────────────
// Fábrica de componentes — cada personaje es un PNG con sparkles
// superpuestos. Se exportan con los nombres que ya consume el resto
// de la app: MagoCharacter, FisicaCharacter, etc.
// ─────────────────────────────────────────────────────────────
function makeCharacter(id, sparkleColor, sparkleSeed) {
  return function Character({ size = 200, floating = true }) {
    return (
      <div
        className={floating ? "ed-float-soft" : ""}
        style={{
          width: size, height: size,
          position: "relative",
          display: "inline-block",
          lineHeight: 0,
        }}
      >
        <img
          src={`assets/char-${id}.png`}
          alt=""
          draggable="false"
          style={{
            width: "100%", height: "100%",
            objectFit: "contain",
            display: "block",
            filter: "drop-shadow(0 6px 14px rgba(0,0,0,0.35))",
            userSelect: "none",
            pointerEvents: "none",
          }}
        />
        {/* Sparkles overlay — viewBox 200×200 para mantener las posiciones
            relativas idénticas a la versión SVG previa. */}
        <svg
          viewBox="0 0 200 200"
          aria-hidden="true"
          style={{
            position: "absolute", inset: 0,
            width: "100%", height: "100%",
            pointerEvents: "none",
            overflow: "visible",
          }}
        >
          <Sparkles color={sparkleColor} count={6} seed={sparkleSeed} />
        </svg>
      </div>
    );
  };
}

// ─────────────────────────────────────────────────────────────
// Fondo cósmico + glifos matemáticos flotantes (se reusa en todas las
// pantallas excepto la del aula en pizarra).
// ─────────────────────────────────────────────────────────────
function CosmosBg({ variant = "cosmic", glyphSize }) {
  // `glyphSize` es la fuente base de los glifos en CSS px, calculada en
  // DeviceStage a partir del vw/vh defendido contra cambios de DPR. Si se
  // recibe, se aplica inline y gana sobre el `clamp(48px, 7vmin, 110px)` de
  // styles.css. Sin esto, ctrl+rueda del mouse hace que los glifos crezcan
  // mucho más rápido que el lienzo: el lienzo está congelado pero CSS sigue
  // leyendo el vmin actual del navegador y los glifos tocan el mínimo del
  // clamp, mientras el navegador amplifica todo visualmente.
  const glyphsStyle = glyphSize ? { fontSize: glyphSize + "px" } : undefined;
  if (variant === "chalkboard") {
    return (
      <div
        style={{
          position: "absolute",
          inset: 0,
          background:
            "radial-gradient(ellipse at center, #3a9b7a 0%, #1d6b53 55%, #0b3a2d 100%)",
          overflow: "hidden",
        }}
      >
        <div className="ed-glyphs" style={{ color: "rgba(255,255,255,0.10)", ...glyphsStyle }}>
          <span style={{ left: "6%", top: "12%", "--rot": "-8deg" }}>√</span>
          <span style={{ left: "82%", top: "16%", "--rot": "6deg", fontSize: "0.62em" }}>π</span>
          <span style={{ left: "10%", top: "78%", "--rot": "12deg", fontSize: "0.7em" }}>∞</span>
          <span style={{ left: "88%", top: "72%", "--rot": "-10deg", fontSize: "0.55em" }}>÷</span>
          <span style={{ left: "45%", top: "8%", "--rot": "4deg", fontSize: "0.5em" }}>∑</span>
          <span style={{ left: "3%", top: "45%", "--rot": "-4deg", fontSize: "0.6em" }}>x²</span>
          <span style={{ left: "92%", top: "45%", "--rot": "8deg", fontSize: "0.58em" }}>½</span>
          <span style={{ left: "30%", top: "55%", "--rot": "-6deg", fontSize: "0.5em" }}>+</span>
          <span style={{ left: "70%", top: "62%", "--rot": "8deg", fontSize: "0.52em" }}>×</span>
          <span style={{ left: "55%", top: "30%", "--rot": "-4deg", fontSize: "0.46em" }}>=</span>
        </div>
      </div>
    );
  }
  return (
    <>
      <div className="ed-cosmos" />
      <div className="ed-glyphs" style={glyphsStyle}>
        <span style={{ left: "5%", top: "10%", "--rot": "-8deg" }}>x²</span>
        <span style={{ left: "84%", top: "6%", "--rot": "6deg", fontSize: "0.78em" }}>π</span>
        <span style={{ left: "92%", top: "72%", "--rot": "-12deg", fontSize: "0.74em" }}>√</span>
        <span style={{ left: "3%", top: "82%", "--rot": "12deg", fontSize: "0.91em" }}>∑</span>
        <span style={{ left: "46%", top: "4%", "--rot": "-4deg", fontSize: "0.59em" }}>∞</span>
        <span style={{ left: "7%", top: "46%", "--rot": "-4deg", fontSize: "0.67em" }}>½</span>
        <span style={{ left: "88%", top: "40%", "--rot": "8deg", fontSize: "0.65em" }}>÷</span>
        <span style={{ left: "22%", top: "22%", "--rot": "10deg", fontSize: "0.52em" }}>+</span>
        <span style={{ left: "70%", top: "24%", "--rot": "-6deg", fontSize: "0.57em" }}>−</span>
        <span style={{ left: "32%", top: "70%", "--rot": "8deg", fontSize: "0.61em" }}>×</span>
        <span style={{ left: "62%", top: "78%", "--rot": "-10deg", fontSize: "0.63em" }}>=</span>
        <span style={{ left: "18%", top: "58%", "--rot": "14deg", fontSize: "0.48em" }}>7</span>
        <span style={{ left: "78%", top: "56%", "--rot": "-8deg", fontSize: "0.52em" }}>3</span>
        <span style={{ left: "50%", top: "88%", "--rot": "4deg", fontSize: "0.5em" }}>△</span>
        <span style={{ left: "40%", top: "38%", "--rot": "-6deg", fontSize: "0.54em" }}>%</span>
      </div>
    </>
  );
}

// ─────────────────────────────────────────────────────────────
// Visitor ticker — valor persistente en localStorage que se incrementa
// al entrar. Útil para dar sensación de "contador público" sin backend.
// ─────────────────────────────────────────────────────────────
// Contador de partidas completadas (persistente en localStorage).
// Se incrementa al terminar cada juego. Pensado para servidores estáticos
// sin backend — sólo HTML + localStorage del navegador.
// Contador de VISITANTES ─────────────────────────────────────
// Suma +1 cada vez que se monta HomeScreen (cada entrada al inicio cuenta,
// incluso múltiples veces en el mismo dispositivo). El total vive en
// localStorage y persiste entre sesiones. Pensado para servidores estáticos
// sin backend.
function useVisitorCount() {
  const [n, setN] = useState(0);
  useEffect(() => {
    const KEY = "edinun_visitors_v1";
    let current = parseInt(localStorage.getItem(KEY) || "0", 10);
    if (isNaN(current)) current = 0;
    current += 1;
    localStorage.setItem(KEY, String(current));
    setN(current);
  }, []);
  return n;
}

// SVG de personitas para el contador de visitantes.
function PeopleIcon({ size = 18, color = "#fce9a8" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="8" cy="7" r="3" fill={color} />
      <circle cx="16" cy="7" r="3" fill={color} opacity="0.85" />
      <path d="M2 20c0-3.3 2.7-6 6-6s6 2.7 6 6v1H2v-1z" fill={color} />
      <path d="M14 20c0-2 -.7-3.8-1.8-5.2 1-.5 2.1-.8 3.3-.8 3.3 0 6 2.7 6 6v1H14v-1z" fill={color} opacity="0.85" />
    </svg>
  );
}

function incrementGamesCompleted() {
  const KEY = "edinun_games_completed_v1";
  const raw = localStorage.getItem(KEY);
  const next = (raw ? parseInt(raw, 10) : 0) + 1;
  localStorage.setItem(KEY, String(next));
  window.dispatchEvent(new Event("edinun:games-updated"));
  return next;
}

// ─────────────────────────────────────────────────────────────

    setApp((s) => ({

      studentName: name.trim(),
      level,
      sessionStart: Date.now(),
    }));
    go("character");

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>


      {/* Contador de visitantes (abajo derecha, con icono de personitas) */}
      <div
        style={{
          position: "absolute",
          bottom: 18,
          right: 22,
          display: "flex",
          alignItems: "center",
          gap: 8,
          background: "rgba(10,6,35,0.55)",

          padding: "6px 12px",
          backdropFilter: "blur(8px)",

        <PeopleIcon size={16} color="#fce9a8" />
        <div style={{ fontFamily: "var(--ed-font-mono)", fontSize: 11, color: "#f2c260", letterSpacing: "0.06em" }}>
          {visitors.toLocaleString("es-CO")}
          <span style={{ color: "rgba(246,241,255,0.55)", marginLeft: 6 }}>visitas</span>
        </div>
      </div>

      {/* Contenido principal */}
      <div
        style={{
          position: "absolute", inset: 0,
          display: "grid",
          gridTemplateColumns: "1fr 1.15fr",
          alignItems: "center",
          padding: "40px 56px",
          gap: 40,
        }}
      >
        {/* Columna izquierda — logo protagonista */}
        <div style={{ position: "relative", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <EdinunLogo size={300} />
        </div>

        {/* Columna derecha — entrada + niveles */}
        <div style={{ display: "flex", flexDirection: "column", gap: 22, maxWidth: 520 }}>
          <div>
            <div className="ed-label" style={{ color: "#4fd8ff", marginBottom: 8 }}>
              EDINUN · Juegos de matemáticas
            </div>
            <h1 className="ed-h1" style={{ fontSize: 44, lineHeight: 1.05 }}>
              ¡Bienvenido/a,{" "}
              <span style={{
                background: "linear-gradient(180deg,#fce9a8,#d9a441)",
                WebkitBackgroundClip: "text",
                WebkitTextFillColor: "transparent",
                fontWeight: 600,
              }}>
                Estudiante!
              </span>
            </h1>
          </div>

          {/* 1. Selección de nivel — primer paso del flujo. Va arriba para que
              el niño elija qué quiere jugar antes de identificarse: tocar un
              botón grande de color es más concreto que escribir un nombre. */}
          <div>
            <div className="ed-label" style={{ marginBottom: 10 }}>
              Selecciona un nivel para jugar
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
              {[
                { id: "basic", label: "BÁSICO", grad: "linear-gradient(180deg, #ffc06e, #e4881a)", ink: "#3a2608" },
                { id: "medium", label: "MEDIO", grad: "linear-gradient(180deg, #ffe97a, #d7b12a)", ink: "#3a2608" },
                { id: "advanced", label: "AVANZADO", grad: "linear-gradient(180deg, #7ab8ff, #2773d8)", ink: "#08264d" },
              ].map((lv) => {
                const active = level === lv.id;
                return (
                  <button
                    key={lv.id}
                    onClick={() => setLevel(lv.id)}
                    style={{
                      padding: "16px 8px",
                      borderRadius: 18,
                      background: lv.grad,
                      color: lv.ink,
                      fontFamily: "var(--ed-font-display)",
                      fontWeight: 700,
                      fontSize: 18,
                      letterSpacing: "0.02em",
                      boxShadow: active
                        ? "inset 0 1px 0 rgba(255,255,255,0.55), inset 0 -3px 0 rgba(0,0,0,0.2), 0 0 0 3px rgba(255,255,255,0.85), 0 0 28px rgba(255,255,255,0.35)"
                        : "inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.18), 0 6px 14px -4px rgba(0,0,0,0.45)",
                      transform: active ? "translateY(-2px)" : "none",
                      transition: "all 0.18s ease",
                      textShadow: "0 1px 0 rgba(255,255,255,0.25)",
                    }}
                  >
                    {lv.label}
                  </button>
                );
              })}

            {/* Descripción corta del nivel — pensada para 2do (6–8 años):
                una frase clara, sin detalles técnicos. */}
            <div style={{
              marginTop: 12,
              padding: "10px 14px",
              borderRadius: 12,

              explicativo, sin párrafo redundante (USER.md: corto y accionable). */}

                ENTRAR →
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// 2. SELECCIÓN DE PERSONAJE
// ─────────────────────────────────────────────────────────────
function CharacterScreen({ app, setApp, go }) {
  const [sel, setSel] = useState(app.character || "mago");
  const current = CHARACTERS.find((c) => c.id === sel) || CHARACTERS[0];

  function choose() {
    // Derivar la categoría desde el nivel elegido en Home:
    //   básico  → aleatorio entre suma y resta
    //   medio   → multiplicación
    //   avanzado→ división
    const level = app.level || "basic";
    let catId = "suma", catLabel = "Sumas";
    if (level === "basic") {
      const pick = Math.random() < 0.5 ? ["suma", "Sumas"] : ["resta", "Restas"];
      catId = pick[0]; catLabel = pick[1];
    } else if (level === "medium") {
      catId = "mult"; catLabel = "Multiplicaciones";
    } else if (level === "advanced") {
      catId = "div"; catLabel = "Divisiones";
    }
    setApp((s) => ({
      ...s,
      character: sel,
      currentCategory: catId,
      currentCatLabel: catLabel,
    }));
    go("game");
  }

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>


      {/* Header — primero "Hola, X", luego logo grande a la derecha */}
      <div style={{ position: "absolute", top: 18, left: 24, right: 24, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button className="ed-btn ed-btn-ghost" onClick={() => go("home")} style={{ padding: "8px 14px" }}>
          ← VOLVER
        </button>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 700, color: "#fce9a8", fontSize: 20, textShadow: "0 2px 6px rgba(0,0,0,0.45)" }}>
            Hola, {app.studentName || "Estudiante"} 👋
          </div>
          <EdinunLogoMini size={64} />

const { useState: useStateG, useEffect: useEffectG, useRef: useRefG, useMemo: useMemoG } = React;

// Portal a <body> para sacar overlays/modales del scope del DeviceStage,
// que aplica `transform: scale()` al lienzo 900×540. Sin esto, un
// `position: fixed` o `absolute` con `inset: 0` solo cubre el área del
// lienzo escalado y deja los laterales del letterboxing sin oscurecer.
function PortalToBody({ children }) {
  return ReactDOM.createPortal(children, document.body);
}

// ─────────────────────────────────────────────────────────────
// Generador de problemas por categoría
// ─────────────────────────────────────────────────────────────
function makeProblem(cat) {
  const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
  switch (cat) {
    case "suma": {
      const a = rand(12, 89), b = rand(10, 99);
      return { a, b, op: "+", answer: a + b };
    }
    case "resta": {
      let a = rand(50, 999), b = rand(10, 499);
      if (b > a) [a, b] = [b, a];
      return { a, b, op: "−", answer: a - b };
    }
    case "mult": {
      const a = rand(2, 12), b = rand(2, 9);
      return { a, b, op: "×", answer: a * b };
    }
    case "div": {
      const b = rand(2, 9);
      const ans = rand(2, 12);
      return { a: b * ans, b, op: "÷", answer: ans };
    }
    case "frac":
      return { a: 1, b: 2, op: "+", answer: 3, frac: true };
    default: {
      const a = rand(10, 99), b = rand(10, 99);
      return { a, b, op: "+", answer: a + b };
    }
  }
}

function digits(n) {
  return String(n).split("");
}

// ─────────────────────────────────────────────────────────────
// PANTALLA DE JUEGO — pizarra estilo referencia pero cósmica
// ─────────────────────────────────────────────────────────────
// Frases motivadoras matemáticas para cuando el estudiante se equivoca
// (no se repite el ejercicio; el feedback acompaña con carisma).
const ENCOURAGEMENTS = [
  "¡Casi! Sigue intentándolo.",
  "Los números no muerden 🔢",
  "¡La próxima es tuya!",
  "Equivocarse también es aprender.",
  "Las matemáticas son una aventura.",
  "¡Vamos al siguiente reto!",
  "Cada error te acerca al acierto.",
];

function GameScreen({ app, setApp, go }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const cat = app.currentCategory || "suma";
  const catLabel = app.currentCatLabel || "Sumas";

  const [problem, setProblem] = useStateG(() => makeProblem(cat));
  const [answer, setAnswer] = useStateG([]);
  const [elapsed, setElapsed] = useStateG(0);
  // Estrellas SIEMPRE empiezan en 0 al iniciar una partida — no acumulan
  // entre rondas (regla pedida por el usuario).
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);       // aciertos en la sesión
  const [attempted, setAttempted] = useStateG(0); // ejercicios intentados (correctos o no)
  const [starsSession, setStarsSession] = useStateG(0); // estrellas ganadas en la sesión actual
  const [feedback, setFeedback] = useStateG(null); // 'ok' | 'err' | null
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [hintOn, setHintOn] = useStateG(false);
  // Cambio de nivel desde los tabs del HUD: guarda el nivel propuesto
  // mientras se muestra el modal de confirmación. null = sin modal.
  const [pendingLevel, setPendingLevel] = useStateG(null);
  // Modal de confirmación para salir del juego (navega a home y descarta
  // el progreso de la ronda actual). Antes era "rendirse" → resultados
  // parciales; el flujo se simplificó a salir directo al inicio.
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  // Log de ejercicios de la ronda — alimenta el reporte académico de
  // ResultsScreen. Cada entrada: {idx, a, b, op, correctAnswer, userAnswer,
  // isCorrect, time, earned}.
  const [log, setLog] = useStateG([]);

  const slots = digits(problem.answer).length;
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  // Cronómetro total
  useEffectG(() => {
    const id = setInterval(() => {
      setElapsed(Math.floor((Date.now() - started.current) / 1000));
    }, 500);
    return () => clearInterval(id);
  }, []);

  // answer es un array alineado con la operación — answer[0] es la más
  // significativa (centena), answer[slots-1] es la unidad. Se llena de
  // derecha a izquierda: primero unidades, luego decenas, luego centenas.
  function press(d) {
    setAnswer((prev) => {
      const next = [...prev];
      while (next.length < slots) next.push(undefined);
      // Buscar de derecha a izquierda el primer slot vacío
      for (let i = slots - 1; i >= 0; i--) {
        if (next[i] === undefined) { next[i] = d; return next; }
      }
      return prev; // todos llenos
    });
  }
  function eraseAt(i) {
    setAnswer((prev) => {
      const next = [...prev];
      while (next.length < slots) next.push(undefined);
      next[i] = undefined;
      return next;
    });
  }
  function erase() {
    // Borra el último dígito colocado (el de más a la izquierda entre los llenos)
    setAnswer((prev) => {
      const next = [...prev];
      while (next.length < slots) next.push(undefined);
      for (let i = 0; i < slots; i++) {
        if (next[i] !== undefined) { next[i] = undefined; return next; }
      }
      return next;
    });
  }
  function verify() {
    const filled = Array.from({ length: slots }, (_, i) => answer[i]);
    if (filled.some(d => d === undefined || d === "")) {
      // Faltan dígitos: feedback de error suave (no consume intento)
      setFeedback("err");
      setFeedbackMsg("Completa todos los casilleros");
      setTimeout(() => { setFeedback(null); setFeedbackMsg(""); }, 700);
      return;
    }
    const joined = filled.join("");
    const entered = parseInt(joined, 10);
    const isCorrect = entered === problem.answer;
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    // Estrellas por ejercicio: máximo 10, decrece con el tiempo. <3s → 10, +3s cada vez.
    const earned = isCorrect ? Math.max(1, 10 - Math.floor(exerciseSec / 3)) : 0;

    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsSession = starsSession + earned;
    const newStarsTotal = stars + earned;

    const entry = {
      idx: newAttempted,
      a: problem.a,
      b: problem.b,
      op: problem.op,
      correctAnswer: problem.answer,
      userAnswer: entered,
      isCorrect,
      time: exerciseSec,
      earned,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect
      ? `+${earned} ⭐`
      : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]
    );
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 950 : 1200;
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      setAnswer([]);
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s,
          stars: newStarsTotal,
          lastResult: {
            category: catLabel,
            solved: newSolved,
            total: 3,
            time: elapsed,
            starsEarned: newStarsSession,
            log: newLog,
          },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setProblem(makeProblem(cat));
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  // Aplica un cambio de nivel desde los tabs: deriva nueva categoría,
  // regenera problema y resetea ronda (intentos/aciertos/cronómetro).
  // No navega — sigue en la pantalla de juego.
  function applyLevelChange(newLevel) {
    let catId = "suma", catLabel = "Sumas";
    if (newLevel === "basic") {
      const pick = Math.random() < 0.5 ? ["suma", "Sumas"] : ["resta", "Restas"];
      catId = pick[0]; catLabel = pick[1];
    } else if (newLevel === "medium") {
      catId = "mult"; catLabel = "Multiplicaciones";
    } else if (newLevel === "advanced") {
      catId = "div"; catLabel = "Divisiones";
    }
    setApp((s) => ({ ...s, level: newLevel, currentCategory: catId, currentCatLabel: catLabel }));
    setProblem(makeProblem(catId));
    setAnswer([]);
    setSolved(0);
    setAttempted(0);
    setStreak(0);
    setMaxStreak(0);
    setStarsSession(0);
    setLog([]);
    setFeedback(null);
    setFeedbackMsg("");
    started.current = Date.now();
    exerciseStart.current = Date.now();
    setElapsed(0);
  }


  function formatTime(s) {
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return `${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
  }

  const aDigits = digits(problem.a);
  const bDigits = digits(problem.b);
  const maxLen = Math.max(aDigits.length, bDigits.length);
  const padA = Array(maxLen - aDigits.length).fill(" ").concat(aDigits);
  const padB = Array(maxLen - bDigits.length).fill(" ").concat(bDigits);

  // Tab activo = nivel actual de la sesión (`app.level`), NO derivado de
  // CATEGORIES. El catálogo tiene a `div` marcado como "medium" pero en este
  // juego mapeamos avanzado → división, así que basarse en CATEGORIES.level
  // hacía que el tab quedara desincronizado al cambiar a Avanzado.
  const levelOfCat = app.level || "basic";

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>


      {/* Top HUD — el centro (tabs de nivel) está absolutamente centrado en la
          pantalla, no entre las dos columnas, para que no se desplace cuando el
          logo es más ancho que el timer/stars de la derecha. */}
      <div style={{ position: "absolute", top: 10, left: 16, right: 16, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
        {/* Izq: logo (mismo tamaño que CharacterScreen para consistencia) */}
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <EdinunLogoMini size={64} />
        </div>

        {/* Centro: barra de niveles — clickeable, anclada al centro real de la
            pantalla. Tocar un nivel distinto al actual abre un modal de
            confirmación; aceptar reinicia la ronda con la dificultad nueva. */}
        <div style={{
          position: "absolute", left: "50%", top: "50%",
          transform: "translate(-50%, -50%)",
          display: "flex", alignItems: "center", gap: 8,
        }}>
          {[
            { id: "basic", label: "BÁSICO", c: "#f5a623" },
            { id: "medium", label: "MEDIO", c: "#f5d84b" },
            { id: "advanced", label: "AVANZADO", c: "#4fa0ff" },
          ].map((lv) => {
            const active = lv.id === levelOfCat;
            return (
              <button
                key={lv.id}
                onClick={() => { if (!active) setPendingLevel(lv.id); }}
                disabled={active}
                style={{
                  padding: "6px 14px", borderRadius: 999,
                  background: active ? lv.c : "rgba(255,255,255,0.15)",
                  color: active ? "#0b3a2d" : "rgba(255,255,255,0.85)",
                  fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 13,
                  border: active ? `2px solid ${lv.c}` : "2px solid transparent",
                  boxShadow: active ? `0 0 14px ${lv.c}88` : "none",
                  cursor: active ? "default" : "pointer",
                  transition: "background 0.15s ease, transform 0.1s ease",
                }}
              >
                {lv.label}
              </button>
            );
          })}
        </div>

        {/* Der: stats */}
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{
            display: "flex", alignItems: "center", gap: 6,
            background: "rgba(0,0,0,0.35)", borderRadius: 999, padding: "6px 12px",
            border: "1px solid rgba(242,194,96,0.4)", fontFamily: "var(--ed-font-mono)", fontSize: 13, color: "#fce9a8",
          }}>
            ⏱ {formatTime(elapsed)}
          </div>
          <div style={{
            display: "flex", alignItems: "center", gap: 6,
            background: "rgba(0,0,0,0.35)", borderRadius: 999, padding: "6px 12px",
            border: "1px solid rgba(242,194,96,0.4)", fontFamily: "var(--ed-font-display)", fontWeight: 600, color: "#fce9a8",
          }}>
            ⭐ {stars}
          </div>
        </div>
      </div>

      {/* Pista de juego — bocadillo en la zona superior izquierda, sobre el
          personaje. Explica COMO resolver (no QUE resolver), en una linea
          pensada para 2do (6-8 anos): verbo directo + referencia a la columna
          U para anclar la mirada en la rejilla CDU. Universal a todos los
          niveles porque la regla "llenar de derecha a izquierda" aplica
          siempre, sin importar la operacion. */}
      <div style={{
        position: "absolute", left: 14, top: 130, width: 215,
        pointerEvents: "none",
      }}>
        <div style={{
          position: "relative",
          background: "linear-gradient(180deg, rgba(20,12,55,0.92), rgba(10,6,35,0.92))",
          border: "1.5px solid rgba(242,194,96,0.55)",
          borderRadius: 16,
          padding: "12px 14px",
          fontFamily: "var(--ed-font-display)",
          fontWeight: 700, fontSize: 17, lineHeight: 1.25,
          color: "#fce9a8", textAlign: "center",
          boxShadow: "0 8px 22px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08)",
        }}>
          Empieza por las unidades (U).
          {/* Pico del bocadillo apuntando hacia el personaje (abajo). */}
          <div style={{
            position: "absolute", bottom: -8, left: "50%", marginLeft: -7,
            width: 0, height: 0,
            borderLeft: "7px solid transparent",
            borderRight: "7px solid transparent",
            borderTop: "8px solid rgba(20,12,55,0.92)",
            filter: "drop-shadow(0 1px 0 rgba(242,194,96,0.55))",
          }} />
        </div>
      </div>

      {/* Personaje compañero — lado izquierdo, elevado para no chocar con el
          numpad. La frase motivadora aparece en el feedback central (con
          atribución al personaje); el bocadillo de arriba lleva la pista
          de mecánica del juego.
          Sin z-index: queda en el orden natural del DOM, por encima de los
          glifos del fondo pero por debajo de la ecuación, numpad y botones,
          que vienen después en el JSX. */}
      <div style={{
        position: "absolute", left: 8, bottom: 90, width: 220,
        pointerEvents: "none", textAlign: "center",
      }}>
        <div style={{ position: "relative", display: "flex", justifyContent: "center" }}>
          <div style={{
            position: "absolute", bottom: 0, left: "50%", transform: "translateX(-50%)",
            width: 150, height: 18, borderRadius: "50%",
            background: "radial-gradient(ellipse, rgba(242,194,96,0.45), transparent 70%)",
            filter: "blur(5px)",
          }} />
          <char.Component size={200} floating />
        </div>
        <div style={{
          marginTop: -4,
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14,
          color: "#fce9a8", letterSpacing: "0.04em",
          textShadow: "0 2px 6px rgba(0,0,0,0.6)",
        }}>{char.name}</div>
      </div>

      {/* Racha / progreso — separado del HUD para que no se pegue a los tabs de nivel */}
      <div style={{
        position: "absolute", top: 78, left: "50%", transform: "translateX(-50%)",
        display: "flex", alignItems: "center", gap: 8,
      }}>
        <span className="ed-label" style={{ color: "rgba(255,255,255,0.7)" }}>Ronda</span>
        {[0,1,2].map((i) => (
          <div key={i} style={{
            width: 10, height: 10, borderRadius: "50%",
            background: i < attempted ? (i < solved ? "#fce9a8" : "#ff6b6b") : "rgba(255,255,255,0.2)",
            boxShadow: i < attempted ? "0 0 10px currentColor" : "none",
            color: i < solved ? "#fce9a8" : "#ff6b6b",
          }} />
        ))}
      </div>

      {/* ══════ ECUACIÓN PROTAGONISTA ══════
          Centrada en la pantalla, ocupa el espacio principal.
          Columnas CDU alineadas verticalmente. Los slots quedan
          debajo de la línea divisoria, directamente bajo las columnas. */}
      {(() => {
        const DIGIT_W = 64;     // ancho de cada columna (número/slot)
        const GAP = 10;         // gap entre columnas
        const OP_W = 50;        // ancho de la celda del operador
        // CRÍTICO: el número de columnas debe cubrir tanto los operandos
        // como el resultado. Si slots > maxLen (ej. 59+74=133 → 3 slots, maxLen=2),
        // ampliamos el grid y padeamos los operandos a la izquierda con celdas vacías.
        const columns = Math.max(maxLen, slots);
        const TOTAL_W = OP_W + columns * DIGIT_W + columns * GAP;
        // Etiquetas CDU siempre alineadas desde la derecha (unidades siempre a la derecha)
        const labels = ["C","D","U"].slice(3 - columns);
        // Padding de operandos a la izquierda para alinear por la derecha con el grid total
        const leftPadA = Array(columns - padA.length).fill(" ");
        const leftPadB = Array(columns - padB.length).fill(" ");
        const fullA = leftPadA.concat(padA);
        const fullB = leftPadB.concat(padB);
        return (
          <div style={{
            position: "absolute", top: 104, left: "50%", transform: "translateX(-50%)",
            // El wrapper se ensancha para dar lugar a la instruccion en una
            // sola linea con un fontSize legible cuando el lienzo se escala
            // hacia abajo en telefonos. El equation grid interno sigue
            // centrado con justifyContent: center, asi que las columnas CDU
            // no se mueven — solo el texto del enunciado tiene mas aire.
            textAlign: "center", width: Math.max(TOTAL_W, 480),
          }}>
            <div style={{
              fontFamily: "var(--ed-font-display)", fontWeight: 700,
              fontSize: 20, lineHeight: 1.15,
              color: "#fff", marginBottom: 10,
              textShadow: "0 2px 6px rgba(0,0,0,0.45)",
            }}>
              Toca un número de abajo para llenar.
            </div>

            {/* Encabezado C D U — alineado sobre las columnas de dígitos */}
            <div style={{
              display: "grid",
              gridTemplateColumns: `${OP_W}px repeat(${columns}, ${DIGIT_W}px)`,
              gap: GAP, justifyContent: "center", alignItems: "center",
              marginBottom: 6,
            }}>
              <span />
              {labels.map((lb) => (
                <div key={lb} className={`ed-dice ed-dice-${lb.toLowerCase()}`} style={{ width: 32, height: 32, fontSize: 16, margin: "0 auto" }}>
                  {lb}
                </div>
              ))}
            </div>

            {/* Fila A */}
            <div style={{
              display: "grid",
              gridTemplateColumns: `${OP_W}px repeat(${columns}, ${DIGIT_W}px)`,
              gap: GAP, justifyContent: "center", alignItems: "center",
              fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 54, color: "#fff",
              lineHeight: 1,
            }}>
              <span />
              {fullA.map((d, i) => <span key={`a${i}`}>{d}</span>)}
            </div>

            {/* Fila B con operador */}
            <div style={{
              display: "grid",
              gridTemplateColumns: `${OP_W}px repeat(${columns}, ${DIGIT_W}px)`,
              gap: GAP, justifyContent: "center", alignItems: "center",
              fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 54, color: "#fff",
              lineHeight: 1, marginTop: 2,
            }}>
              <span style={{ textAlign: "center" }}>{problem.op}</span>
              {fullB.map((d, i) => <span key={`b${i}`}>{d}</span>)}
            </div>

            {/* Línea divisoria */}
            <div style={{
              height: 4, background: "#fff", borderRadius: 2,
              margin: "8px auto 10px", width: TOTAL_W - 12,
              boxShadow: "0 0 10px rgba(255,255,255,0.35)",
            }} />

            {/* Slots de respuesta — alineados bajo las columnas CDU (derecha) */}
            <div style={{
              display: "grid",
              gridTemplateColumns: `${OP_W}px repeat(${columns}, ${DIGIT_W}px)`,
              gap: GAP, justifyContent: "center", alignItems: "center",
            }}>
              <span />
              {/* Padding izquierdo vacío para empujar slots a la derecha */}
              {Array.from({ length: columns - slots }).map((_, k) => <span key={`pad${k}`} />)}
              {Array.from({ length: slots }).map((_, i) => {
                const d = answer[i];
                const filled = d !== undefined && d !== "";
                // El slot "activo" es el más a la derecha que esté vacío (U→D→C)
                let activeIdx = -1;
                for (let k = slots - 1; k >= 0; k--) {
                  if (answer[k] === undefined || answer[k] === "") { activeIdx = k; break; }
                }
                const isActive = i === activeIdx;
                return (
                  <div
                    key={i}
                    className={`ed-answer-slot ${isActive ? "active" : ""} ${filled ? "filled" : ""}`}
                    draggable={filled}
                    onDragStart={(e) => {
                      if (!filled) return;
                      e.dataTransfer.setData("text/plain", `s:${i}:${d}`);
                      e.dataTransfer.effectAllowed = "move";
                      e.currentTarget.classList.add("dragging");
                    }}
                    onDragEnd={(e) => e.currentTarget.classList.remove("dragging")}
                    onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add("drag-over"); }}
                    onDragLeave={(e) => e.currentTarget.classList.remove("drag-over")}
                    onDrop={(e) => {
                      e.preventDefault();
                      e.currentTarget.classList.remove("drag-over");
                      const data = e.dataTransfer.getData("text/plain");
                      if (!data) return;
                      setAnswer((prev) => {
                        const next = [...prev];
                        while (next.length < slots) next.push(undefined);
                        if (data.startsWith("s:")) {
                          // Intercambio entre slots: s:<srcIdx>:<digit>
                          const parts = data.split(":");
                          const srcIdx = parseInt(parts[1], 10);
                          const srcDigit = parts.slice(2).join(":");
                          if (Number.isNaN(srcIdx) || srcIdx === i) return next;
                          const here = next[i];
                          next[i] = srcDigit;
                          next[srcIdx] = here; // queda undefined si el destino estaba vacío
                        } else if (data.startsWith("n:")) {
                          // Desde el numpad: n:<digit>
                          next[i] = data.slice(2);
                        } else {
                          // Compatibilidad: tratar como dígito directo
                          next[i] = data;
                        }
                        return next;
                      });
                    }}
                    onClick={() => { if (filled) eraseAt(i); }}
                    title={filled ? "Toca para borrar · arrastra para mover/intercambiar" : "Arrastra un número aquí"}
                    style={{
                      width: DIGIT_W, height: 72, fontSize: 42,
                      margin: "0 auto",
                      borderColor: feedback === "ok" ? "#2ecc8f" : feedback === "err" ? "#ff6b6b" : undefined,
                      boxShadow: feedback === "ok"
                        ? "0 0 18px rgba(46,204,143,0.65)"
                        : feedback === "err"
                          ? "0 0 18px rgba(255,107,107,0.65)"
                          : undefined,
                      color: "#fff",
                      cursor: filled ? "grab" : "default",
                    }}
                  >
                    {filled ? d : ""}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* Fichas arrastrables — fila inferior centrada. Tamaño grande pensado
          para tap cómodo en móvil (después del scale uniforme del lienzo, una
          tecla de 60×64 a scale 0.6 queda ~36×38 en pantalla, suficiente para
          el dedo de un niño). */}
      <div style={{
        position: "absolute", bottom: 14, left: "50%", transform: "translateX(-50%)",
        display: "grid", gridTemplateColumns: "repeat(10, 60px)", gap: 8,
      }}>
        {["1","2","3","4","5","6","7","8","9","0"].map((d, i) => {
          const color = ["#ef5a5a","#f5a623","#f5d84b","#4fa0ff","#2ecc8f"][i % 5];
          return (
            <button
              key={d}
              className="ed-numpad-key ed-draggable"
              draggable="true"
              onDragStart={(e) => {
                e.dataTransfer.setData("text/plain", `n:${d}`);
                e.dataTransfer.effectAllowed = "copy";
                e.currentTarget.classList.add("dragging");
              }}
              onDragEnd={(e) => e.currentTarget.classList.remove("dragging")}
              onClick={() => press(d)}
              style={{
                height: 64, fontSize: 30,
                borderColor: color,
                borderWidth: 2, borderStyle: "solid",
                cursor: "grab",
              }}
              title="Arrastra al casillero o toca para colocar"
            >
              {d}
            </button>
          );
        })}
      </div>

      {/* Botones de acción — columna derecha, centrados verticalmente. Todos
          al mismo tamaño y en mayúsculas para que la columna se vea uniforme. */}
      <div style={{
        position: "absolute", right: 18, top: "50%", transform: "translateY(-50%)",
        display: "flex", flexDirection: "column", gap: 12, width: 150,
      }}>
        <button
          className="ed-btn ed-btn-verify"
          onClick={verify}
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}
        >
          ¡VERIFICAR!
        </button>
        <button
          className="ed-btn ed-btn-erase"
          onClick={erase}
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}
        >
          BORRAR
        </button>
        <button
          className="ed-btn ed-btn-ghost"
          onClick={() => setConfirmingExit(true)}
          title="Salir al inicio"
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}
        >
          SALIR
        </button>
      </div>

      {/* Feedback overlay — renderizado vía Portal a <body> para que el
          backdrop cubra TODO el viewport (incluidos los laterales fuera del
          lienzo 900×540 del DeviceStage). */}
      {feedback && (
        <PortalToBody>
          <div style={{
            position: "fixed", inset: 0, zIndex: 1000,
            pointerEvents: "none",
            display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
            gap: 14,
            background: "rgba(0,0,0,0.62)",
            backdropFilter: "blur(3px)",
            animation: "ed-pop-in 0.3s",
          }}>
            <div style={{
              fontFamily: "'Fredoka','Baloo 2',system-ui,sans-serif",
              fontWeight: 700, fontSize: "clamp(60px, 11vmin, 120px)",
              color: feedback === "ok" ? "#2ecc8f" : "#ff6b6b",
              textShadow: "0 4px 0 rgba(0,0,0,0.45), 0 0 60px currentColor",
            }}>
              {feedback === "ok" ? "¡EXCELENTE!" : "¡UPS!"}
            </div>
            {feedbackMsg && (
              <div style={{
                fontFamily: "'Fredoka','Baloo 2',system-ui,sans-serif",
                fontWeight: 700, fontSize: "clamp(18px, 2.6vmin, 30px)",
                color: feedback === "ok" ? "#fce9a8" : "#fff",
                background: "rgba(0,0,0,0.55)",
                padding: "8px 26px", borderRadius: 999,
                textShadow: "0 2px 6px rgba(0,0,0,0.6)",
                textAlign: "center", maxWidth: "80vw",
              }}>
                {feedback === "ok" ? feedbackMsg : `${feedbackMsg} — ${char.name}`}
              </div>
            )}
          </div>
        </PortalToBody>
      )}

      {/* Modal de confirmación de SALIR — vía portal para cubrir todo el
          viewport. Confirmar lleva directo a home descartando el progreso
          de la ronda actual (no genera reporte). */}
      {confirmingExit && (
        <PortalToBody>
          <div
            onClick={() => setConfirmingExit(false)}
            style={{
              position: "fixed", inset: 0, zIndex: 1000,
              background: "rgba(0,0,0,0.62)",
              backdropFilter: "blur(4px)",
              display: "flex", alignItems: "center", justifyContent: "center",
              animation: "ed-pop-in 0.18s",
              padding: 16,
            }}
          >
            <div
              onClick={(e) => e.stopPropagation()}
              className="ed-card"
              style={{ padding: 24, maxWidth: 440, textAlign: "center", boxShadow: "var(--ed-shadow-card), 0 0 40px rgba(255,107,107,0.3)" }}
            >
              <div className="ed-label" style={{ color: "#ff8b8b", marginBottom: 6 }}>
                Salir del juego
              </div>
              <h2 className="ed-h1" style={{ fontSize: 22, lineHeight: 1.15, marginBottom: 8 }}>
                ¿Volver al inicio?
              </h2>
              <p className="ed-body" style={{ marginBottom: 16, fontSize: 14 }}>
                Vas a perder el progreso de esta ronda ({attempted}/3 ejercicios). No habrá reporte de esta sesión.
              </p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <button className="ed-btn ed-btn-ghost" onClick={() => setConfirmingExit(false)} style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
                  SEGUIR JUGANDO
                </button>
                <button className="ed-btn ed-btn-primary" onClick={() => { setConfirmingExit(false); go("home"); }} style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
                  SÍ, SALIR
                </button>
              </div>
            </div>
          </div>
        </PortalToBody>
      )}

      {/* Modal de confirmación de cambio de nivel desde los tabs — vía portal */}
      {pendingLevel && (() => {
        const labels = { basic: "Básico", medium: "Medio", advanced: "Avanzado" };
        const colors = { basic: "#f5a623", medium: "#f5d84b", advanced: "#4fa0ff" };
        return (
          <PortalToBody>
            <div
              onClick={() => setPendingLevel(null)}
              style={{
                position: "fixed", inset: 0, zIndex: 1000,
                background: "rgba(0,0,0,0.62)",
                backdropFilter: "blur(4px)",
                display: "flex", alignItems: "center", justifyContent: "center",
                animation: "ed-pop-in 0.18s",
                padding: 16,
              }}
            >
              <div
                onClick={(e) => e.stopPropagation()}
                className="ed-card"
                style={{
                  padding: 24, maxWidth: 440, textAlign: "center",
                  boxShadow: "var(--ed-shadow-card), 0 0 40px rgba(242,194,96,0.35)",
                }}
              >
                <div className="ed-label" style={{ color: "#fce9a8", marginBottom: 6 }}>
                  Cambiar dificultad
                </div>
                <h2 className="ed-h1" style={{ fontSize: 22, lineHeight: 1.15, marginBottom: 8 }}>
                  ¿Cambiar a <span style={{ color: colors[pendingLevel] }}>{labels[pendingLevel]}</span>?
                </h2>
                <p className="ed-body" style={{ marginBottom: 16, fontSize: 14 }}>
                  Vas a reiniciar la ronda actual. Perderás el progreso de los
                  ejercicios resueltos hasta ahora en esta sesión.
                </p>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <button
                    className="ed-btn ed-btn-ghost"
                    onClick={() => setPendingLevel(null)}
                    style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}
                  >
                    CANCELAR
                  </button>
                  <button
                    className="ed-btn ed-btn-primary"
                    onClick={() => { applyLevelChange(pendingLevel); setPendingLevel(null); }}
                    style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}
                  >
                    SÍ, CAMBIAR
                  </button>
                </div>
              </div>
            </div>
          </PortalToBody>
        );
      })()}
    </div>
  );
}

// Formatea una operación de ejercicio sin emojis ni signos UI: "23 + 45".
function formatOp(e) {
  return `${e.a} ${e.op} ${e.b}`;
}

// PrintableReport — versión imprimible del reporte académico, montada como
// hermana de #root en <body> via Portal. En pantalla queda oculta
// (`.ed-print-doc { display: none }` en CSS). En @media print se muestra y
// #root se oculta. Esto evita los PDFs en blanco que se daban en iOS al
// usar position:fixed dentro del lienzo escalado del DeviceStage o al
// abrir popups (window.open) que iOS bloquea o no rendea bien para print.
const printStyles = {
  doc: { padding: 0, margin: 0, color: "#111", background: "#fff" },
  head: {
    display: "flex", alignItems: "center", gap: 14,
    borderBottom: "2px solid #d9a441",
    paddingBottom: 10, marginBottom: 14,
  },
  logo: { width: 56, height: 56, objectFit: "contain" },
  title: { flex: 1, minWidth: 0 },
  org: { fontFamily: "'Fredoka','Baloo 2','Nunito',sans-serif", fontWeight: 700, fontSize: "16pt", letterSpacing: "0.03em", lineHeight: 1.1, margin: 0 },
  sub: { fontSize: "9pt", color: "#555", letterSpacing: "0.08em", textTransform: "uppercase", marginTop: 4 },
  date: { fontFamily: "ui-monospace,Consolas,monospace", fontSize: "10pt", color: "#555", textAlign: "right", whiteSpace: "nowrap" },
  fields: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 14 },
  field: { padding: "8px 10px", borderRadius: 6, border: "1px solid #ddd" },
  fieldL: { fontSize: "8pt", textTransform: "uppercase", letterSpacing: "0.08em", color: "#666" },
  fieldV: { fontSize: "12pt", fontWeight: 700, marginTop: 2 },
  table: { width: "100%", borderCollapse: "collapse", fontSize: "11pt" },
  thHead: { borderBottom: "2px solid #111" },
  th: { padding: 8, textAlign: "left", fontSize: "9pt", textTransform: "uppercase", letterSpacing: "0.08em", color: "#555", fontWeight: 700 },
  thR: { textAlign: "right" },
  thC: { textAlign: "center" },
  tr: { borderBottom: "1px solid #ccc" },
  td: { padding: "9px 8px", fontFamily: "ui-monospace,Consolas,monospace" },
  tdNum: { color: "#888", width: 36 },
  tdOp: { fontWeight: 700 },
  tdR: { textAlign: "right" },
  tdC: { textAlign: "center", fontFamily: "'Nunito',sans-serif", fontWeight: 700 },
  tdDim: { color: "#888" },
  tdOk: { color: "#1e8a5d" },
  tdErr: { color: "#c33b3b" },
  tdEmpty: { padding: 24, textAlign: "center", color: "#888", fontStyle: "italic" },
  summary: { marginTop: 16, borderTop: "2px solid #d9a441", paddingTop: 12,
    display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 },
  cell: { padding: 10, borderRadius: 6, border: "1px solid #ddd", textAlign: "center" },
  cellEmp: { background: "#faf3df", borderColor: "#d9a441" },
  cellL: { fontSize: "8pt", textTransform: "uppercase", letterSpacing: "0.08em", color: "#666" },
  cellV: { fontSize: "18pt", fontWeight: 800, marginTop: 4 },
  foot: { marginTop: 16, fontSize: "9pt", color: "#888", textAlign: "center" },
};

function PrintableReport({ studentName, res, dateStr, m, s, attemptedCount, totalEx, accuracy }) {
  const log = res.log || [];
  return (
    <PortalToBody>
      <div className="ed-print-doc" style={printStyles.doc} aria-hidden="true">
        <div style={printStyles.head}>
          <img src="assets/edinun-logo.png" alt="" style={printStyles.logo} />
          <div style={printStyles.title}>
            <h1 style={printStyles.org}>EDINUN — Ediciones Nacionales Unidas</h1>
            <div style={printStyles.sub}>Reporte académico · Juegos de Matemáticas</div>
          </div>
          <div style={printStyles.date}>{dateStr}</div>
        </div>

        <div style={printStyles.fields}>
          <div style={printStyles.field}>
            <div style={printStyles.fieldL}>Estudiante</div>
            <div style={printStyles.fieldV}>{studentName || "—"}</div>
          </div>
          <div style={printStyles.field}>
            <div style={printStyles.fieldL}>Categoría</div>
            <div style={printStyles.fieldV}>{res.category || "—"}</div>
          </div>
          <div style={printStyles.field}>
            <div style={printStyles.fieldL}>Tiempo total</div>
            <div style={printStyles.fieldV}>{String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}</div>
          </div>
        </div>

        <table style={printStyles.table}>
          <thead>
            <tr style={printStyles.thHead}>
              <th style={printStyles.th}>#</th>
              <th style={printStyles.th}>Operación</th>
              <th style={{ ...printStyles.th, ...printStyles.thR }}>Respuesta del estudiante</th>
              <th style={{ ...printStyles.th, ...printStyles.thR }}>Resultado correcto</th>
              <th style={{ ...printStyles.th, ...printStyles.thC }}>Estado</th>
              <th style={{ ...printStyles.th, ...printStyles.thR }}>Tiempo</th>
            </tr>
          </thead>
          <tbody>
            {log.map((e) => (
              <tr key={e.idx} style={printStyles.tr}>
                <td style={{ ...printStyles.td, ...printStyles.tdNum }}>{e.idx}</td>
                <td style={{ ...printStyles.td, ...printStyles.tdOp }}>{e.a} {e.op} {e.b}</td>

// app.jsx — Shell de producción EDINUN GAMES.
// Enrutador por estado y device stage adaptativo (desktop / tablet / mobile).
// Móvil portrait: el contenido NUNCA rota; un overlay BLOQUEANTE obliga
// al usuario a girar físicamente el teléfono antes de poder usar la app.

const { useState: useStateA, useEffect: useEffectA, useRef: useRefA } = React;

// ─────────────────────────────────────────────────────────────
// useViewportSize — devuelve el tamaño REAL visible del viewport.
//
// En iOS Safari (y otros mobile browsers), `window.innerHeight` y `100vh`
// reportan la altura de la ventana INCLUYENDO la URL bar, así que el
// contenido escalado a esa altura termina parcialmente fuera de pantalla
// (ej: el numpad del juego queda debajo del fondo visible). La Visual
// Viewport API reporta el área verdaderamente visible y se actualiza
// cuando la URL bar se muestra/oculta.
// ─────────────────────────────────────────────────────────────
// Detección de "resize REAL" vs "zoom del navegador".
//
// Idea: el tamaño FÍSICO de la zona visible en píxeles del display es
// invariante al ctrl+rueda. Cuando subes el zoom de 100 % a 500 %:
//   · innerWidth en CSS-px se divide entre 5
//   · devicePixelRatio se multiplica por 5
//   · innerWidth × devicePixelRatio queda igual ⇒ NO hubo resize real.
//
// Cuando arrastras la esquina de la ventana o rotas el dispositivo:
//   · innerWidth en CSS-px cambia
//   · devicePixelRatio NO cambia
//   · innerWidth × devicePixelRatio cambia ⇒ SÍ hubo resize real.
//
// Por eso comparamos contra `innerWidth × devicePixelRatio` y solo
// actualizamos el state cuando ese producto cambia. Así el lienzo se
// queda con su tamaño CSS previo durante el zoom y el navegador lo
// amplifica visualmente — junto con los glifos, que ya leen `glyphSize`
// del mismo state defendido (ver DeviceStage).
//
// La defensa anterior (tracker de _lastDPR) era frágil: se actualizaba
// en CADA evento, así que si el navegador disparaba dos resize seguidos
// para la misma acción de zoom, el segundo veía el dpr ya guardado y
// recalculaba el tamaño con el viewport pequeño. Esto causaba que los
// glifos quedaran enormes mientras el lienzo se recomprimía.
function physicalSize() {
  if (typeof window === "undefined") return { w: 0, h: 0 };
  const dpr = window.devicePixelRatio || 1;
  return { w: window.innerWidth * dpr, h: window.innerHeight * dpr };
}
let _lastPhysical = physicalSize();

function useViewportSize() {
  const [size, setSize] = useStateA(() => readSize());
  useEffectA(() => {
    function onChange() {
      const phys = physicalSize();
      // Tolerancia de 4 px reales para absorber redondeos del navegador.
      if (Math.abs(phys.w - _lastPhysical.w) < 4 && Math.abs(phys.h - _lastPhysical.h) < 4) {
        // Mismo display, distinto zoom — no actualizamos el state.
        return;
      }
      _lastPhysical = phys;
      setSize(readSize());
    }
    window.addEventListener("resize", onChange);
    window.addEventListener("orientationchange", onChange);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onChange);
    }
    return () => {
      window.removeEventListener("resize", onChange);
      window.removeEventListener("orientationchange", onChange);
      if (window.visualViewport) {
        window.visualViewport.removeEventListener("resize", onChange);
      }
    };
  }, []);
  return size;
}
function readSize() {
  if (typeof window === "undefined") return { vw: 0, vh: 0 };
  const vv = window.visualViewport;
  // Cuando el usuario hace pinch-zoom, vv.scale > 1 y vv.width/height
  // reflejan la región visible (más pequeña). Usar esos valores haría
  // que la escala del lienzo se reduzca al hacer zoom — exactamente lo
  // contrario de lo que el usuario quiere. Solo confiamos en vv cuando
  // scale ≈ 1 (sin zoom) — ahí da una lectura más fiel que innerWidth/
  // Height en iOS Safari (descuenta correctamente la URL bar visible).
  if (vv && Math.abs(vv.scale - 1) < 0.05) {
    return { vw: vv.width, vh: vv.height };
  }
  return { vw: window.innerWidth, vh: window.innerHeight };
}

// ─────────────────────────────────────────────────────────────
// DeviceStage — escala el lienzo lógico 900×540 (paisaje) al viewport.
//
// Reglas:
//   · Desktop / tablet: sin marco, sin notch, fondo cósmico edge-to-edge.
//   · Mobile portrait: lienzo letterboxed Y overlay BLOQUEANTE "Gira el
//     teléfono". El contenido del juego no es accesible hasta que rote.
//   · Mobile landscape: lienzo escalado al viewport visible (visualViewport,
//     no innerHeight, para no clippearse debajo de la URL bar de iOS).
// ─────────────────────────────────────────────────────────────
function DeviceStage({ children, variant = "cosmic" }) {
  const W = 900, H = 540;
  const { vw, vh } = useViewportSize();
  const minSide = Math.min(vw, vh);
  const maxSide = Math.max(vw, vh);
  let mode = "desktop";
  if (maxSide < 820) mode = "mobile";
  else if (minSide < 820) mode = "tablet";
  const portrait = vh > vw;
  const baseScale = Math.max(Math.min(vw / W, vh / H), 0.15);

  // Detección de teléfono independiente del modo: cualquier dispositivo con
  // lado menor ≤ 600 CSS-px es un teléfono. Cubre todos los teléfonos
  // actuales (iPhone SE 320 → S25 Ultra/Pro Max ~432) con margen para
  // modelos futuros más anchos. La menor tablet (iPad mini 744) queda
  // bien por encima, así que no se rompe el caso "tablet portrait usable
  // letterboxed". Solo bloqueamos cuando teléfono Y portrait — el lienzo
  // paisaje queda demasiado pequeño para jugar.
  const isPhone = minSide <= 600;
  const lockPortrait = isPhone && portrait;

  // Tamaño de los glifos del fondo: equivalente al `clamp(48px, 7vmin, 110px)`
  // que tenía el CSS, pero calculado a partir del vw/vh DEFENDIDO contra
  // cambios de DPR. Esto evita que con ctrl+rueda del mouse los glifos
  // crezcan más rápido que el lienzo (el lienzo se congela vía la defensa
  // del DPR; si CSS lee el vmin actual, los glifos no se congelan y desync).
  const glyphSize = Math.max(48, Math.min(minSide * 0.07, 110));

  const debug = typeof window !== "undefined" && /(?:^|[#&])debug(?:&|$)/.test(window.location.hash || "");

  // ─── Pinch-zoom y pan custom ─────────────────────────────────
  // Reemplaza el zoom nativo del browser. Razón: con el lienzo letterboxed
  // dentro de un wrapper viewport-sized, el visual viewport del browser
  // puede panear hasta dejar al usuario mirando solo el cosmos vacío de los
  // bordes — el "rebote" reportado en iPhone (ver .planning/ios-zoom.md).
  // Aquí los gestos operan sobre el transform del lienzo, así que el zoom
  // siempre gravita alrededor del contenido y no deriva a un borde
  // decorativo.
  const wrapperRef = useRefA(null);
  const gestureRef = useRefA(null);
  const stateRef = useRefA({ userZoom: 1, pan: { x: 0, y: 0 } });
  const [userZoom, setUserZoom] = useStateA(1);
  const [pan, setPan] = useStateA({ x: 0, y: 0 });
  const [duringGesture, setDuringGesture] = useStateA(false);

  useEffectA(() => {
    stateRef.current = { userZoom, pan };
  }, [userZoom, pan]);

  // Reset al cambiar viewport (rotación, resize). Si no, el pan queda
  // referenciado a un viewport que ya no existe.
  useEffectA(() => {
    setUserZoom(1);
    setPan({ x: 0, y: 0 });
    setDuringGesture(false);
  }, [vw, vh]);

  useEffectA(() => {
    if (lockPortrait) return;
    const el = wrapperRef.current;
    if (!el) return;

    const Z_MIN = 1;
    const Z_MAX = 4;

    const dist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const mid = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

    function clampPan(zoom, px, py) {
      // Pan máximo: la mitad del exceso del lienzo escalado sobre el viewport.
      // En zoom=1 el max es 0 (lienzo cabe en viewport, no hay donde panear).
      // En zoom=N el lienzo mide N veces el lado contain, así que el usuario
      // puede mover ±(sw - vw)/2 antes de que la orilla del lienzo cruce la
      // orilla del viewport. Esto evita perder el contenido fuera de pantalla.
      const sw = baseScale * zoom * W;
      const sh = baseScale * zoom * H;
      const maxX = Math.max(0, (sw - vw) / 2);
      const maxY = Math.max(0, (sh - vh) / 2);
      return {
        x: Math.max(-maxX, Math.min(maxX, px)),
        y: Math.max(-maxY, Math.min(maxY, py)),
      };
    }

    function applyState(z, px, py) {
      stateRef.current = { userZoom: z, pan: { x: px, y: py } };
      setUserZoom(z);
      setPan({ x: px, y: py });
    }

    function onTouchStart(e) {
      const { userZoom: z0, pan: p0 } = stateRef.current;
      if (e.touches.length >= 2) {
        const [t0, t1] = e.touches;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0, p0: { ...p0 },
        };
        setDuringGesture(true);
        e.preventDefault();
      } else if (e.touches.length === 1) {
        const t = e.touches[0];
        gestureRef.current = {
          mode: "pan-armed",
          startX: t.clientX,
          startY: t.clientY,
          z0, p0: { ...p0 },
        };
        // No preventDefault — un tap simple debe seguir generando click.
      }
    }

    function onTouchMove(e) {
      const g = gestureRef.current;
      if (!g) return;

      // Si en medio de un gesto entra un segundo dedo, transición a pinch
      // tomando el estado actual como punto de partida.
      if (e.touches.length >= 2 && g.mode !== "pinch") {
        const [t0, t1] = e.touches;
        const { userZoom: zNow, pan: pNow } = stateRef.current;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0: zNow, p0: { ...pNow },
        };
        setDuringGesture(true);
        e.preventDefault();
        return;
      }

      if (e.touches.length >= 2 && g.mode === "pinch") {
        const [t0, t1] = e.touches;
        const d = dist(t0, t1);
        const m = mid(t0, t1);
        const ratio = d / g.d0;
        // Permitimos pasar transitoriamente bajo Z_MIN para sensación elástica
        // durante el gesto; en touchend hacemos snap-back al rango válido.
        const newZoom = Math.max(Z_MIN * 0.7, Math.min(Z_MAX * 1.05, g.z0 * ratio));
        const r = newZoom / g.z0;
        const ux = g.m0.x - vw / 2;
        const uy = g.m0.y - vh / 2;
        // Fórmula que mantiene el punto medio de la pinza anclado al mismo
        // píxel del lienzo durante todo el gesto. Derivación:
        //   panX_new = (mx0 - vw/2) + (newZoom/z0) * (panX0 - (mx0 - vw/2))
        //              + (mx_now - mx0)   ← desplazamiento del propio gesto
        const newPanX = ux + r * (g.p0.x - ux) + (m.x - g.m0.x);
        const newPanY = uy + r * (g.p0.y - uy) + (m.y - g.m0.y);
        applyState(newZoom, newPanX, newPanY);
        e.preventDefault();
      } else if (e.touches.length === 1 && g.mode === "pan-armed") {
        if (g.z0 <= 1.001) return; // sin zoom no panea — dejamos pasar el tap
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        if (Math.hypot(dx, dy) > 8) {
          gestureRef.current = { ...g, mode: "pan" };
          setDuringGesture(true);
          e.preventDefault();
        }
      } else if (e.touches.length === 1 && g.mode === "pan") {
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        applyState(g.z0, g.p0.x + dx, g.p0.y + dy);
        e.preventDefault();
      }
    }

    function onTouchEnd(e) {
      const g = gestureRef.current;
      if (!g) return;
      if (e.touches.length === 0) {
        const { userZoom: z, pan: p } = stateRef.current;
        const clampedZ = Math.max(Z_MIN, Math.min(Z_MAX, z));
        let cp;
        if (clampedZ <= 1.001) {
          cp = { x: 0, y: 0 };
        } else {
          cp = clampPan(clampedZ, p.x, p.y);
        }
        applyState(clampedZ, cp.x, cp.y);
        setDuringGesture(false);
        gestureRef.current = null;
      }
    }

    el.addEventListener("touchstart", onTouchStart, { passive: false });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd, { passive: false });
    el.addEventListener("touchcancel", onTouchEnd, { passive: false });

    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      el.removeEventListener("touchend", onTouchEnd);
      el.removeEventListener("touchcancel", onTouchEnd);
    };
  }, [vw, vh, baseScale, lockPortrait]);

  const totalScale = baseScale * userZoom;

  return (
    <div ref={wrapperRef} style={{
      width: "100vw", height: "100dvh",
      minHeight: "-webkit-fill-available",
      overflow: "hidden",
      position: "relative",
      background: variant === "chalkboard" ? "#0b3a2d" : "#050214",
      // `touch-action: none` desactiva todos los gestos que el browser
      // interpretaría por su cuenta (pinch, pan, doble-tap-zoom). Los
      // implementamos en JS sobre el transform del lienzo para que el
      // zoom siempre quede anclado al contenido y nunca derive a los
      // bordes letterbox del wrapper. Los click/tap en botones siguen
      // funcionando — esto solo bloquea gestos del browser, no eventos.
      touchAction: "none",
    }}>
      <CosmosBg variant={variant} glyphSize={glyphSize} />

      {/* Lienzo lógico 900×540 centrado y escalado.
          El transform combina el escalado base (contain del viewport),
          el zoom del usuario y el pan acumulado. El orden CSS es
          right-to-left: scale → translate(pan) → translate(-50%,-50%). */}
      <div style={{
        width: W, height: H,
        position: "absolute",
        left: "50%", top: "50%",
        transform: `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px) scale(${totalScale})`,
        transformOrigin: "center center",
        overflow: "hidden",
        // Sin transición durante el gesto activo (el lienzo sigue la pinza
        // al instante); con transición elástica al soltar, para que el
        // snap-back de zoom/pan a los límites válidos no sea abrupto.
        transition: duringGesture ? "none" : "transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1)",
        willChange: "transform",
      }}>
        {children}
      </div>

      {lockPortrait && <RotateLockOverlay />}
      {debug && (
        <div style={{
          position: "fixed", top: 6, left: 6, zIndex: 999999,
          background: "rgba(0,0,0,0.85)", color: "#0f0",
          font: "11px ui-monospace,Menlo,monospace",
          padding: "6px 8px", borderRadius: 6,
          maxWidth: "90vw", whiteSpace: "pre",
          pointerEvents: "none",
        }}>
{`vw=${vw} vh=${vh}
min=${minSide} max=${maxSide}
mode=${mode} portrait=${portrait}
isPhone=${isPhone} LOCK=${lockPortrait}
zoom=${userZoom.toFixed(2)} pan=${pan.x.toFixed(0)},${pan.y.toFixed(0)}
vv=${typeof window!=="undefined" && window.visualViewport ? "yes" : "no"}
ua=${(typeof navigator!=="undefined" ? navigator.userAgent : "?").slice(0,60)}`}
        </div>
      )}
    </div>
  );
}

// Overlay bloqueante de rotación. En mobile portrait cubre toda la pantalla
// con un mensaje claro y un ícono animado. NO se puede descartar — el usuario
// DEBE girar el dispositivo para acceder al juego. Se desmonta solo cuando
// el viewport pasa a landscape.
function RotateLockOverlay() {
  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="Gira tu teléfono para jugar"
      style={{
        position: "fixed", inset: 0, zIndex: 99999,
        background: "linear-gradient(180deg,#050214 0%,#0a0628 100%)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        textAlign: "center", padding: "32px 24px",
        color: "#fce9a8",
        fontFamily: "var(--ed-font-display, system-ui)",
      }}
    >
      <div
        style={{
          width: 132, height: 132, marginBottom: 28,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "ed-rotate-lock 2.4s ease-in-out infinite",
        }}
        aria-hidden="true"
      >
        {/* Ícono de teléfono que rota */}
        <svg viewBox="0 0 100 100" width="120" height="120" fill="none">
          <rect x="36" y="14" width="28" height="72" rx="6"
                stroke="#f2c260" strokeWidth="3" fill="rgba(242,194,96,0.08)" />
          <rect x="42" y="22" width="16" height="48" rx="2" fill="rgba(242,194,96,0.18)" />
          <circle cx="50" cy="78" r="2.5" fill="#f2c260" />
        </svg>
      </div>
      <div style={{
        fontWeight: 800,
        fontSize: "clamp(18px, 5.2vw, 26px)",
        lineHeight: 1.15,
        textTransform: "uppercase", letterSpacing: "0.02em",
        marginBottom: 12,
      }}>
        Gira tu teléfono
      </div>
      <div style={{
        fontWeight: 500,
        fontSize: "clamp(13px, 4vw, 16px)",
        lineHeight: 1.4,
        color: "rgba(252,233,168,0.78)",
        maxWidth: "min(320px, 80vw)",
      }}>
        Pon tu teléfono de lado para jugar.
      </div>
      <style>{`
        @keyframes ed-rotate-lock {
          0%   { transform: rotate(0deg); }
          45%  { transform: rotate(0deg); }
          70%  { transform: rotate(-90deg); }
          100% { transform: rotate(-90deg); }
        }
      `}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App principal
// ─────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useStateA("home");
  const [app, setApp] = useStateA({
    studentName: "",
    character: "mago",
    level: "basic",
    stars: 0,
    sessionStart: Date.now(),
    gameSeed: 0,
  });

  function go(r) {
    // Al (re)entrar al juego, regeneramos la seed para que GameScreen se remonte
    // y reinicie ronda, tiempo, racha, etc. También reseteamos las estrellas:
    // cada partida empieza desde 0, no acumula entre rondas.
    if (r === "game") {
      setApp((s) => ({ ...s, gameSeed: (s.gameSeed || 0) + 1, stars: 0 }));
    }
    setRoute(r);
  }

  const screenProps = { app, setApp, go };

  let Screen = window.HomeScreen;
  if (route === "character") Screen = window.CharacterScreen;
  else if (route === "game") Screen = window.GameScreen;
  else if (route === "results") Screen = window.ResultsScreen;

  const variant = route === "game" ? "chalkboard" : "cosmic";

  return (
    <DeviceStage variant={variant}>
      <Screen key={route === "game" ? `game-${app.gameSeed}` : route} {...screenProps} />
    </DeviceStage>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
