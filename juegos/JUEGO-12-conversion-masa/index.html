// ─────────────────────────────────────────────────────────────
// Sparkles — chispas animadas alrededor del personaje. Sobreviven de
// la versión SVG porque dan vida y refuerzan la estética cósmica.
// ─────────────────────────────────────────────────────────────
function Sparkles({ color = "#fce9a8", count = 6, seed = 1 }) {
  const pts = Array.from({ length: count }, (_, i) => {
    const a = (i * 360) / count + seed * 37;
    const r = 70 + (i % 3) * 8;
    const x = 100 + Math.cos((a * Math.PI) / 180) * r;
    const y = 100 + Math.sin((a * Math.PI) / 180) * r;
    const s = 2 + (i % 3);
    return { x, y, s, delay: i * 0.35 };
  });
  return (
    <g>
      {pts.map((p, i) => (
        <g key={i} transform={`translate(${p.x} ${p.y})`}>
          <circle r={p.s} fill={color} opacity="0.9">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin={`${p.delay}s`} repeatCount="indefinite" />
          </circle>
        </g>
      ))}
    </g>
  );
}

// ─────────────────────────────────────────────────────────────
// Contador de visitas — endpoint PHP del lado servidor con fallback localStorage.
// En servidores con PHP (Apache de edinun.com) muestra el conteo global real.
// En GitHub Pages / servidor estático sin PHP, el .php se sirve como texto
// plano → el fetch falla parseando JSON → caemos al contador localStorage
// (per-navegador, igual que la versión anterior). El localStorage también
// hace de caché del último valor servido por PHP para mostrar algo durante
// la primera carga / si el servidor está caído.
// ─────────────────────────────────────────────────────────────
const VISITOR_ENDPOINT = "counter.php"; // relativo a index.html del juego
const VISITOR_KEY = "edinun_visitors_v1";
const VISITOR_SESSION_FLAG = "edinun_visit_counted_v1";

async function fetchVisitorCount(opts) {
  const inc = opts && opts.increment;
  const url = inc ? VISITOR_ENDPOINT + "?inc=1" : VISITOR_ENDPOINT;
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error("counter http " + res.status);
  // Tolera dos contratos de servidor: JSON {"count": N} (counter.php de este
  // repo) o un numero plano "N" (contador.php legacy de otros juegos del mismo
  // server). Si el .php se sirve como texto ("<?php...") ambos parseos fallan
  // -> NaN -> throw -> el cliente cae a localStorage.
  const text = (await res.text()).trim();
  let count;
  try {
    const data = JSON.parse(text);
    count = data && typeof data.count === "number" ? data.count : Number(data);
  } catch (e) {
    count = Number(text);
  }
  if (!Number.isFinite(count)) throw new Error("counter invalid payload");
  return count;
}

function readLocalVisitorCount() {
  const raw = localStorage.getItem(VISITOR_KEY);
  const v = raw ? parseInt(raw, 10) : 0;
  return isNaN(v) ? 0 : v;
}

function writeLocalVisitorCount(n) {
  localStorage.setItem(VISITOR_KEY, String(n));
}

function useVisitorCount() {
  const [n, setN] = useState(() => readLocalVisitorCount());

  useEffect(() => {
    let cancelled = false;
    // Lee del servidor al montar. Si falla, queda el valor cacheado en local.
    fetchVisitorCount()
      .then((count) => {
        if (cancelled) return;
        setN(count);
        writeLocalVisitorCount(count);
      })
      .catch(() => { /* fallback localStorage ya cargado en el initializer */ });

    function onUpdate(ev) {
      const value = ev && ev.detail && ev.detail.count;
      if (typeof value === "number") setN(value);
      else setN(readLocalVisitorCount());
    }
    window.addEventListener("edinun:visitors-updated", onUpdate);
    return () => {
      cancelled = true;
      window.removeEventListener("edinun:visitors-updated", onUpdate);
    };
  }, []);

  return n;
}

function markFirstAttempt() {
  if (sessionStorage.getItem(VISITOR_SESSION_FLAG) === "1") return;
  sessionStorage.setItem(VISITOR_SESSION_FLAG, "1");

  fetchVisitorCount({ increment: true })
    .then((count) => {
      writeLocalVisitorCount(count);
      window.dispatchEvent(new CustomEvent("edinun:visitors-updated", { detail: { count } }));
    })
    .catch(() => {
      const next = readLocalVisitorCount() + 1;
      writeLocalVisitorCount(next);
      window.dispatchEvent(new CustomEvent("edinun:visitors-updated", { detail: { count: next } }));
    });
}

  const KEY = "edinun_games_completed_v1";
  const raw = localStorage.getItem(KEY);

  window.dispatchEvent(new Event("edinun:games-updated"));
  return next;
}

// game-screens.jsx — Juego de Conversión entre unidades de masa
// (1 nivel, 3 rondas con mecánicas distintas).
// Audiencia 10 años (excepción al default 6-8 del repo).

const { useState: useStateG, useEffect: useEffectG, useRef: useRefG, useMemo: useMemoG } = React;

// Portal a <body> para sacar overlays/modales del scope del DeviceStage.
function PortalToBody({ children }) {
  return ReactDOM.createPortal(children, document.body);
}

// ─────────────────────────────────────────────────────────────
// Conversiones — toda la aritmética se hace en GRAMOS.
//   1 kg = 1 000 g
//   1 t  = 1 000 000 g
//   1 lb ≈ 454 g (redondeado a entero, factor real 453,59)
//   1 mg = 0,001 g
// El factor lb se aproxima a 454 para mantener respuestas enteras.
// Para conversiones kg ↔ lb el libro usa 1 kg = 2,2 lb (pool entero).
// ─────────────────────────────────────────────────────────────
const G_PER_KG = 1000;
const G_PER_T = 1000000;
const G_PER_LB = 454;

function toGrams(value, unit) {
  if (unit === "g") return value;
  if (unit === "kg") return value * G_PER_KG;
  if (unit === "t") return value * G_PER_T;
  if (unit === "lb") return value * G_PER_LB;
  if (unit === "mg") return value / 1000;
  return value;
}

function fromGrams(grams, unit) {
  if (unit === "g") return grams;
  if (unit === "kg") return grams / G_PER_KG;
  if (unit === "t") return grams / G_PER_T;
  if (unit === "lb") return grams / G_PER_LB;
  if (unit === "mg") return grams * 1000;
  return grams;
}

// Helper para mostrar números con coma decimal (es-CO style).
function fmt(n) {
  if (Number.isInteger(n)) return String(n);
  const rounded = Math.round(n * 1000) / 1000;
  return String(rounded).replace(".", ",");
}

// ─────────────────────────────────────────────────────────────
// Pool de objetos para R1 (¿Cuál pesa más?)
// ─────────────────────────────────────────────────────────────

  { name: "Hoja", massG: 5 },

];

// Devuelve una unidad de display razonable para una masa en gramos.
// Sortea entre opciones válidas para esa magnitud.
function pickDisplayUnit(massG) {
  const candidates = [];
  if (massG < 1000) candidates.push("g");
  if (massG >= 500 && massG < 100000) candidates.push("kg");
  if (massG >= 1000 && massG < 1000000 && massG % G_PER_LB < 10) candidates.push("lb");
  if (massG >= 100000) candidates.push("kg");
  if (massG >= 1000000) candidates.push("t");
  if (candidates.length === 0) candidates.push("g");
  return candidates[Math.floor(Math.random() * candidates.length)];
}

// ─────────────────────────────────────────────────────────────
// Generador de problemas — 1 categoría ("masa"), 3 rondas con
// mecánicas distintas.
//   idx 0 → ¿Cuál pesa más? (3 productos en unidades distintas)
//   idx 1 → ¿Cuál NO equivale? (1 origen + 4 opciones, 1 falsa)
//   idx 2 → Conversión paso a paso (numpad 2 pasos)
// ─────────────────────────────────────────────────────────────
function makeProblem(cat, idx = 0) {
  const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
  const pickN = (arr, n) => {
    const copy = [...arr];
    const out = [];
    for (let i = 0; i < n && copy.length > 0; i++) {
      out.push(copy.splice(rand(0, copy.length - 1), 1)[0]);
    }
    return out;
  };

  if (idx === 0) {
    // R1 — Balanza binaria. 2 masas en unidades distintas, decidir si
    // pesa más la izquierda, son iguales, o pesa más la derecha.
    //
    // Outcome se decide primero (40% left, 20% equal, 40% right) y luego
    // se elige el par desde un pool curado.
    const outcomeRoll = rand(0, 9);
    let outcome;
    if (outcomeRoll < 4) outcome = "left";
    else if (outcomeRoll < 6) outcome = "equal";
    else outcome = "right";

    // Pares EQUIVALENTES (mismo peso real, distintas unidades).
    const equalPairs = [
      [5, "kg", 11, "lb"],
      [10, "kg", 22, "lb"],
      [25, "kg", 55, "lb"],
      [1, "t", 1000, "kg"],
      [2, "t", 2000, "kg"],
      [1, "kg", 1000, "g"],
      [3, "kg", 3000, "g"],
      [5000, "g", 5, "kg"],
      [11, "lb", 5, "kg"],
      [22, "lb", 10, "kg"],
    ];

    // Pares DESIGUALES con izquierda más pesada.
    const leftHeavier = [
      [3, "kg", 2500, "g"],     // 3000 vs 2500
      [1, "kg", 800, "g"],       // 1000 vs 800
      [5, "kg", 5, "lb"],        // 5000 vs 2270
      [22, "lb", 5, "kg"],       // 10000 vs 5000
      [1, "t", 900, "kg"],       // 1000000 vs 900000
      [10, "kg", 10, "lb"],      // 10000 vs 4540
      [2, "kg", 1500, "g"],      // 2000 vs 1500
      [55, "lb", 20, "kg"],      // ~25000 vs 20000
      [3, "t", 2500, "kg"],      // 3000000 vs 2500000
      [50, "kg", 100, "lb"],     // 50000 vs 45400
    ];

    let pair;
    if (outcome === "equal") {
      pair = equalPairs[rand(0, equalPairs.length - 1)];
    } else if (outcome === "left") {
      pair = leftHeavier[rand(0, leftHeavier.length - 1)];
    } else {
      // right: tomar uno de leftHeavier y voltear lados
      const p = leftHeavier[rand(0, leftHeavier.length - 1)];
      pair = [p[2], p[3], p[0], p[1]];
    }

    return {
      type: "masa", idx,
      left: { value: pair[0], unit: pair[1] },
      right: { value: pair[2], unit: pair[3] },
      outcome,
    };
  }

  if (idx === 1) {
    // R2 — ¿Cuál NO equivale? Pool curado donde TODA fuente tiene
    // EXACTAMENTE 3 equivalencias simples (sin decimales raros, sin mg).
    // 3 correctas + 1 falsa = 4 opciones en grid 2x2.
    const sources = [
      { unit: "kg", value: 100, equivalences: [
        { unit: "t", value: 0.1 },
        { unit: "g", value: 100000 },
        { unit: "lb", value: 220 },
      ]},
      { unit: "kg", value: 500, equivalences: [
        { unit: "t", value: 0.5 },
        { unit: "g", value: 500000 },
        { unit: "lb", value: 1100 },
      ]},
      { unit: "kg", value: 1000, equivalences: [
        { unit: "t", value: 1 },
        { unit: "g", value: 1000000 },
        { unit: "lb", value: 2200 },
      ]},
      { unit: "kg", value: 2000, equivalences: [
        { unit: "t", value: 2 },
        { unit: "g", value: 2000000 },
        { unit: "lb", value: 4400 },
      ]},
      { unit: "t", value: 0.1, equivalences: [
        { unit: "kg", value: 100 },
        { unit: "g", value: 100000 },
        { unit: "lb", value: 220 },
      ]},
      { unit: "t", value: 0.5, equivalences: [
        { unit: "kg", value: 500 },
        { unit: "g", value: 500000 },
        { unit: "lb", value: 1100 },
      ]},
      { unit: "t", value: 1, equivalences: [
        { unit: "kg", value: 1000 },
        { unit: "g", value: 1000000 },
        { unit: "lb", value: 2200 },
      ]},
      { unit: "t", value: 2, equivalences: [
        { unit: "kg", value: 2000 },
        { unit: "g", value: 2000000 },
        { unit: "lb", value: 4400 },
      ]},
      { unit: "t", value: 5, equivalences: [
        { unit: "kg", value: 5000 },
        { unit: "g", value: 5000000 },
        { unit: "lb", value: 11000 },
      ]},
      { unit: "g", value: 100000, equivalences: [
        { unit: "kg", value: 100 },
        { unit: "t", value: 0.1 },
        { unit: "lb", value: 220 },
      ]},
      { unit: "g", value: 500000, equivalences: [
        { unit: "kg", value: 500 },
        { unit: "t", value: 0.5 },
        { unit: "lb", value: 1100 },
      ]},
      { unit: "g", value: 1000000, equivalences: [
        { unit: "kg", value: 1000 },
        { unit: "t", value: 1 },
        { unit: "lb", value: 2200 },
      ]},
      { unit: "lb", value: 220, equivalences: [
        { unit: "kg", value: 100 },
        { unit: "t", value: 0.1 },
        { unit: "g", value: 100000 },
      ]},
      { unit: "lb", value: 1100, equivalences: [
        { unit: "kg", value: 500 },
        { unit: "t", value: 0.5 },
        { unit: "g", value: 500000 },
      ]},
      { unit: "lb", value: 2200, equivalences: [
        { unit: "kg", value: 1000 },
        { unit: "t", value: 1 },
        { unit: "g", value: 1000000 },
      ]},
    ];

    const src = sources[rand(0, sources.length - 1)];

    // Las 3 correctas son TODAS las equivalencias del source.
    const corrects = src.equivalences.slice();

    // Falsa: tomar una de las correctas y moverle los ceros (×10, ×100, ÷10).
    // Validar que el resultado NO coincida con ninguna correcta.
    const baseFalse = corrects[rand(0, corrects.length - 1)];
    const corruptOps = [10, 100, 0.1];
    let falseValue;
    let attempts = 0;
    do {
      const op = corruptOps[rand(0, corruptOps.length - 1)];
      falseValue = baseFalse.value * op;
      attempts++;
    } while (
      attempts < 8 &&
      corrects.some((c) => c.unit === baseFalse.unit && Math.abs(c.value - falseValue) < 1e-9)
    );
    const falseOption = { unit: baseFalse.unit, value: falseValue, isFalse: true };

    const allOptions = [...corrects.map((c) => ({ ...c, isFalse: false })), falseOption];
    // Shuffle
    for (let i = allOptions.length - 1; i > 0; i--) {
      const j = rand(0, i);
      [allOptions[i], allOptions[j]] = [allOptions[j], allOptions[i]];
    }

    return {
      type: "masa", idx,
      source: { unit: src.unit, value: src.value },
      options: allOptions,
    };
  }

  // R3 — Conversión paso a paso. 2 saltos.
  const chains = [
    {
      sourceUnit: "t", midUnit: "kg", finalUnit: "g",
      values: [1, 2, 3, 5, 7, 10],
      midFactor: 1000, finalFactor: 1000,
    },
    {
      sourceUnit: "g", midUnit: "kg", finalUnit: "t",
      values: [1000000, 2000000, 5000000, 7000000, 10000000],
      midFactor: 1 / 1000, finalFactor: 1 / 1000,
    },
    {
      sourceUnit: "lb", midUnit: "kg", finalUnit: "g",
      values: [11, 22, 33, 44, 55, 110, 220],
      midFactor: 1 / 2.2, finalFactor: 1000,
    },
    {
      sourceUnit: "kg", midUnit: "g", finalUnit: "mg",
      values: [1, 2, 3, 5, 10],
      midFactor: 1000, finalFactor: 1000,
    },
  ];

  const chain = chains[rand(0, chains.length - 1)];
  const sourceValue = chain.values[rand(0, chain.values.length - 1)];
  const midValue = sourceValue * chain.midFactor;
  const finalValue = midValue * chain.finalFactor;

  return {
    type: "masa", idx,
    sourceUnit: chain.sourceUnit, sourceValue,
    midUnit: chain.midUnit, midValue,
    finalUnit: chain.finalUnit, finalValue,
  };
}

function SlotBox({ value, feedback, size = 50 }) {
  const filled = value !== "" && value !== undefined;
  const h = Math.round(size * 1.3);
  const fs = Math.round(size * 0.66);
  return (
    <div style={{
      width: size, height: h,
      display: "flex", alignItems: "center", justifyContent: "center",
      borderRadius: 10,
      border: `2px solid ${
        feedback === "ok" ? "#2ecc8f" :
        feedback === "err" ? "#ff6b6b" :
        filled ? "#fce9a8" : "rgba(252,233,168,0.45)"
      }`,
      background: filled ? "rgba(252,233,168,0.12)" : "rgba(0,0,0,0.25)",
      fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: fs,
      color: "#fff",
      boxShadow: feedback === "ok" ? "0 0 14px rgba(46,204,143,0.55)"
              : feedback === "err" ? "0 0 14px rgba(255,107,107,0.55)" : "none",
      transition: "all 0.15s ease",
    }}>
      {filled ? value : ""}
    </div>
  );
}

// answerLayout: dado un valor (puede ser decimal), devuelve los slots
// con la coma fija si corresponde.
function answerLayout(value) {
  const str = fmt(value);
  return str.split("").map((c) => (c === "," ? "," : "_"));
}

function GameScreen({ app, setApp, go }) {

  // Reset slots cuando cambia el problema o el paso (solo R3).
  useEffectG(() => {

      const target = currentStepIdx === 0 ? problem.midValue : problem.finalValue;
      setSlots(answerLayout(target));
    } else {
      setSlots([]);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [problem, currentStepIdx]);

  // Reset al cambiar de problema.
  useEffectG(() => {
    setCurrentStepIdx(0);
    setCompletedSteps([]);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [problem]);

  useEffectG(() => {
    const id = setInterval(() => {
      setElapsed(Math.floor((Date.now() - started.current) / 1000));
    }, 500);
    return () => clearInterval(id);
  }, []);

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return `${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
  }

  // ────── R1: balanza binaria ──────
  // chosen ∈ {"left","equal","right"}. Correcto si === problem.outcome.
  const outcomeLabel = (o) =>
    o === "left" ? "Izquierda pesa más" :
    o === "right" ? "Derecha pesa más" :
    "Son iguales";

  function answerTapR1(chosen) {
    if (problem.idx !== 0 || feedback !== null) return;
    const isCorrect = chosen === problem.outcome;

    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();

    const entry = {
      a: `${fmt(problem.left.value)} ${problem.left.unit} vs ${fmt(problem.right.value)} ${problem.right.unit}`,
      b: "¿cuál pesa más?",
      op: "→",
      correctAnswer: outcomeLabel(problem.outcome),
      userAnswer: outcomeLabel(chosen),
    };
    finalize(isCorrect, entry);
  }

  // ────── R2: tap directo sobre la opción NO equivalente ──────
  function answerTapR2(chosenIdx) {
    if (problem.idx !== 1 || feedback !== null) return;
    const chosen = problem.options[chosenIdx];
    const isCorrect = chosen.isFalse === true;

    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();

    const falseOption = problem.options.find((o) => o.isFalse);

    const entry = {
      a: `${fmt(problem.source.value)} ${problem.source.unit}`,
      b: "no equivale a",
      op: "≠",
      correctAnswer: `${fmt(falseOption.value)} ${falseOption.unit}`,
      userAnswer: `${fmt(chosen.value)} ${chosen.unit}`,
    };
    finalize(isCorrect, entry);
  }

  // ────── R3: numpad paso a paso ──────
  function pressDigit(d) {
    if (problem.idx !== 2) return;
    for (let i = 0; i < slots.length; i++) {
      if (slots[i] === "_") {
        if (i === 0 && d === "0") {
          const nextIsComma = slots[1] === ",";
          if (!nextIsComma) return;
        }
        const next = [...slots];
        next[i] = d;
        setSlots(next);
        return;
      }
    }
  }

  function eraseLast() {
    if (problem.idx !== 2) return;
    for (let i = slots.length - 1; i >= 0; i--) {
      if (slots[i] !== "_" && slots[i] !== ",") {
        const next = [...slots];
        next[i] = "_";
        setSlots(next);
        return;
      }
    }
  }

  function verify() {
    if (problem.idx !== 2) return;
    const target = currentStepIdx === 0 ? problem.midValue : problem.finalValue;

    const allFilled = slots.every((s) => s !== "_");
    if (!allFilled) {
      setFeedback("err");
      setFeedbackMsg("Completa la respuesta");
      setTimeout(() => { setFeedback(null); setFeedbackMsg(""); }, 700);
      return;
    }

    const userStr = slots.join("").replace(",", ".");
    const userVal = parseFloat(userStr);

    if (Math.abs(userVal - target) > 0.0001) {
      // R3: una respuesta incorrecta termina el ejercicio.
      if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();

      const entry = {
        a: `${fmt(problem.sourceValue)} ${problem.sourceUnit}`,
        b: problem.finalUnit,
        op: "=",
        correctAnswer: fmt(problem.finalValue),
        userAnswer: fmt(userVal),
      };
      finalize(false, entry);
      return;
    }

    // Paso correcto.
    const stepResult = { stepIdx: currentStepIdx, value: target };
    const newCompletedSteps = [...completedSteps, stepResult];
    setCompletedSteps(newCompletedSteps);

    if (currentStepIdx === 1) {
      // Último paso — ejercicio completo.
      if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();

      const entry = {
        a: `${fmt(problem.sourceValue)} ${problem.sourceUnit}`,
        b: problem.finalUnit,
        op: "=",
        correctAnswer: fmt(problem.finalValue),
        userAnswer: fmt(userVal),
      };
      finalize(true, entry);
    } else {
      setFeedback("ok");
      setFeedbackMsg(`${fmt(target)} ${problem.midUnit} ✓`);
      setTimeout(() => {
        setFeedback(null);
        setFeedbackMsg("");
        setCurrentStepIdx(1);
      }, 600);
    }
  }

  function finalize(isCorrect, partialEntry) {
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = isCorrect ? Math.max(1, 10 - Math.floor(exerciseSec / 3)) : 0;

    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsSession = starsSession + earned;
    const newStarsTotal = stars + earned;

    const entry = {
      idx: newAttempted,
      ...partialEntry,
      isCorrect,
      time: exerciseSec,
      earned,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect
      ? `+${earned} ⭐`
      : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]
    );
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 950 : 1200;
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s,
          stars: newStarsTotal,
          lastResult: {
            category: catLabel,
            solved: newSolved,
            total: 3,
            time: elapsed,
            starsEarned: newStarsSession,
            log: newLog,
          },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setProblem(makeProblem(cat, newAttempted));
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  function restartGame() {
    setProblem(makeProblem(cat, 0));
    setSlots([]);
    setCurrentStepIdx(0);
    setCompletedSteps([]);
    setStars(0);
    setSolved(0);
    setAttempted(0);
    setStarsSession(0);
    setLog([]);
    setFeedback(null);
    setFeedbackMsg("");
    started.current = Date.now();
    exerciseStart.current = Date.now();
  }

  const bocadilloText = problem.idx === 2
    ? "Ingresa los números correctos."
    : "Selecciona la respuesta correcta.";
  const instructionText =
    problem.idx === 0 ? "¿Cuál pesa más?" :
    problem.idx === 1 ? "¿Cuál NO equivale?" :
    "Convierte paso a paso";

  function slotSize() {
    const expectedLen = slots.filter((s) => s === "_").length;
    if (expectedLen <= 1) return 52;
    if (expectedLen === 2) return 46;
    if (expectedLen === 3) return 40;
    if (expectedLen === 4) return 36;
    if (expectedLen === 5) return 32;
    if (expectedLen === 6) return 30;
    return 28;
  }

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      {/* HUD superior */}
      <div data-qa="hud" style={{ position: "absolute", top: 10, left: 16, right: 16, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <EdinunLogoMini size={64} />
        </div>

        <div style={{
          position: "absolute", left: "50%", top: "50%",
          transform: "translate(-50%, -50%)",
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 16,
          color: "#fce9a8", letterSpacing: "0.04em",
          textShadow: "0 2px 6px rgba(0,0,0,0.45)",
        }}>
          {catLabel}
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{
            display: "flex", alignItems: "center", gap: 6,
            background: "rgba(0,0,0,0.35)", borderRadius: 999, padding: "6px 12px",
            border: "1px solid rgba(242,194,96,0.4)", fontFamily: "var(--ed-font-mono)", fontSize: 13, color: "#fce9a8",
          }}>
            ⏱ {formatTime(elapsed)}
          </div>
          <div style={{
            display: "flex", alignItems: "center", gap: 6,
            background: "rgba(0,0,0,0.35)", borderRadius: 999, padding: "6px 12px",
            border: "1px solid rgba(242,194,96,0.4)", fontFamily: "var(--ed-font-display)", fontWeight: 600, color: "#fce9a8",
          }}>
            ⭐ {stars}
          </div>
        </div>
      </div>

      {/* Indicador de Ronda */}
      <div style={{
        position: "absolute", top: 64, left: "50%", transform: "translateX(-50%)",
        display: "flex", alignItems: "center", gap: 8,
      }}>
        <span className="ed-label" style={{ color: "rgba(255,255,255,0.7)" }}>Ronda</span>
        {[0,1,2].map((i) => (
          <div key={i} style={{
            width: 10, height: 10, borderRadius: "50%",
            background: i < attempted ? (i < solved ? "#fce9a8" : "#ff6b6b") : "rgba(255,255,255,0.2)",
            boxShadow: i < attempted ? "0 0 10px currentColor" : "none",
            color: i < solved ? "#fce9a8" : "#ff6b6b",
          }} />
        ))}
      </div>

      {/* Bocadillo de pista */}
      <div data-qa="bocadillo" style={{
        position: "absolute", left: 14, top: 130, width: 215,
        pointerEvents: "none",
      }}>
        <div style={{
          position: "relative",
          background: "linear-gradient(180deg, rgba(20,12,55,0.92), rgba(10,6,35,0.92))",
          border: "1.5px solid rgba(242,194,96,0.55)",
          borderRadius: 16,
          padding: "12px 14px",
          fontFamily: "var(--ed-font-display)",
          fontWeight: 700, fontSize: 15, lineHeight: 1.25,
          color: "#fce9a8", textAlign: "center",
          boxShadow: "0 8px 22px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08)",
        }}>
          {bocadilloText}
          <div style={{
            position: "absolute", bottom: -8, left: "50%", marginLeft: -7,
            width: 0, height: 0,
            borderLeft: "7px solid transparent",
            borderRight: "7px solid transparent",
            borderTop: "8px solid rgba(20,12,55,0.92)",
            filter: "drop-shadow(0 1px 0 rgba(242,194,96,0.55))",
          }} />
        </div>
      </div>

      {/* Personaje */}
      <div data-qa="personaje" style={{
        position: "absolute", left: 8, bottom: 90, width: 220,
        pointerEvents: "none", textAlign: "center",
      }}>
        <div style={{ position: "relative", display: "flex", justifyContent: "center" }}>
          <div style={{
            position: "absolute", bottom: 0, left: "50%", transform: "translateX(-50%)",
            width: 150, height: 18, borderRadius: "50%",
            background: "radial-gradient(ellipse, rgba(242,194,96,0.45), transparent 70%)",
            filter: "blur(5px)",
          }} />
          <char.Component size={200} floating />
        </div>
        <div style={{
          marginTop: -4,
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14,
          color: "#fce9a8", letterSpacing: "0.04em",
          textShadow: "0 2px 6px rgba(0,0,0,0.6)",
        }}>{char.name}</div>
      </div>

      {/* ══════ ZONA CENTRAL ══════ */}
      <div data-qa="zona-central" style={{
        position: "absolute", left: "50%",
        top: 88,
        bottom: problem.idx === 2 ? 100 : 18,
        transform: "translateX(-50%)",
        width: 600,
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "space-evenly",
        textAlign: "center",
      }}>
        {/* Instrucción */}
        <div style={{
          fontFamily: "var(--ed-font-display)", fontWeight: 700,
          fontSize: 26, lineHeight: 1.1,
          color: "#fff",
          textShadow: "0 2px 6px rgba(0,0,0,0.45)",
        }}>
          {instructionText}
        </div>

        {/* ────── R1: Balanza binaria ────── */}
        {problem.idx === 0 && (() => {
          // Tilt visual: el lado más PESADO baja.
          // CSS rotate(+N): el extremo DERECHO baja (clockwise).
          // CSS rotate(-N): el extremo IZQUIERDO baja (counter-clockwise).
          const tilt = feedback !== null
            ? (problem.outcome === "left" ? -7 : problem.outcome === "right" ? 7 : 0)
            : 0;

          // Platillo (cup-shape con valor adentro). Reusable para left/right.
          const Pan = ({ value, unit }) => (
            <div style={{
              display: "flex", flexDirection: "column", alignItems: "center",
              gap: 0,
            }}>
              {/* Cuerda */}
              <div style={{
                width: 2, height: 30,
                background: "linear-gradient(180deg, #fce9a8, #b8841d)",
                boxShadow: "1px 0 0 rgba(0,0,0,0.3)",
              }} />
              {/* Cup superior (label valor) */}
              <div style={{
                position: "relative",
                padding: "12px 20px",
                minWidth: 130,
                background: "linear-gradient(180deg, #fce9a8 0%, #d9a441 60%, #8a5a20 100%)",
                borderTopLeftRadius: 14,
                borderTopRightRadius: 14,
                borderBottomLeftRadius: 30,
                borderBottomRightRadius: 30,
                border: "2px solid #6b3d0c",
                boxShadow: "0 6px 14px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.35), inset 0 -3px 0 rgba(0,0,0,0.25)",
                display: "flex", alignItems: "baseline", justifyContent: "center", gap: 4,
                fontFamily: "var(--ed-font-display)", fontWeight: 800,
                color: "#3a1f00",
                textShadow: "0 1px 0 rgba(255,255,255,0.45)",
              }}>
                <span style={{ fontSize: 30 }}>{fmt(value)}</span>
                <span style={{ fontSize: 17, opacity: 0.85 }}>{unit}</span>
              </div>
            </div>
          );

          return (
            <>
              {/* Contenedor de balanza con altura fija para evitar overlap */}
              <div style={{
                position: "relative",
                width: 480, height: 200,
                display: "flex", alignItems: "flex-start", justifyContent: "center",
              }}>
                {/* Beam giratorio + platillos (rotan juntos desde el centro) */}
                <div style={{
                  position: "absolute", top: 20, left: "50%",
                  transform: `translateX(-50%) rotate(${tilt}deg)`,
                  transformOrigin: "center center",
                  transition: "transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)",
                  width: 320, height: 10,
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                }}>
                  {/* Beam horizontal con gradiente metálico */}
                  <div style={{
                    position: "absolute", top: "50%", left: 0, right: 0,
                    transform: "translateY(-50%)",
                    height: 10, borderRadius: 5,
                    background: "linear-gradient(180deg, #fce9a8 0%, #d9a441 50%, #8a5a20 100%)",
                    border: "1.5px solid #6b3d0c",
                    boxShadow: "0 3px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.35)",
                  }} />
                  {/* Bola izquierda (extremo) */}
                  <div style={{
                    position: "relative", zIndex: 2,
                    width: 18, height: 18, borderRadius: "50%",
                    background: "radial-gradient(circle at 35% 30%, #fce9a8, #d9a441 60%, #6b3d0c)",
                    border: "1.5px solid #4d2900",
                    boxShadow: "0 2px 4px rgba(0,0,0,0.4)",
                    marginLeft: -4,
                  }} />
                  {/* Platillo izquierdo (clickable — equivalente a botón ← IZQUIERDA) */}
                  <div
                    onClick={() => answerTapR1("left")}
                    style={{
                      position: "absolute", top: 8, left: 6,
                      transform: "translateX(-50%)",
                      cursor: feedback !== null ? "not-allowed" : "pointer",
                      transition: "transform 0.18s ease, filter 0.18s ease",
                      filter: feedback !== null ? "none" : "drop-shadow(0 0 0 rgba(79,216,255,0))",
                    }}
                    onMouseEnter={(e) => {
                      if (feedback === null) {
                        e.currentTarget.style.transform = "translateX(-50%) scale(1.08)";
                        e.currentTarget.style.filter = "drop-shadow(0 0 14px rgba(79,216,255,0.7))";
                      }
                    }}
                    onMouseLeave={(e) => {
                      e.currentTarget.style.transform = "translateX(-50%)";
                      e.currentTarget.style.filter = "drop-shadow(0 0 0 rgba(79,216,255,0))";
                    }}
                  >
                    <Pan value={problem.left.value} unit={problem.left.unit} />
                  </div>
                  {/* Bola derecha */}
                  <div style={{
                    position: "relative", zIndex: 2,
                    width: 18, height: 18, borderRadius: "50%",
                    background: "radial-gradient(circle at 35% 30%, #fce9a8, #d9a441 60%, #6b3d0c)",
                    border: "1.5px solid #4d2900",
                    boxShadow: "0 2px 4px rgba(0,0,0,0.4)",
                    marginRight: -4,
                  }} />
                  {/* Platillo derecho (clickable — equivalente a botón DERECHA →) */}
                  <div
                    onClick={() => answerTapR1("right")}
                    style={{
                      position: "absolute", top: 8, right: 6,
                      transform: "translateX(50%)",
                      cursor: feedback !== null ? "not-allowed" : "pointer",
                      transition: "transform 0.18s ease, filter 0.18s ease",
                      filter: feedback !== null ? "none" : "drop-shadow(0 0 0 rgba(79,216,255,0))",
                    }}
                    onMouseEnter={(e) => {
                      if (feedback === null) {
                        e.currentTarget.style.transform = "translateX(50%) scale(1.08)";
                        e.currentTarget.style.filter = "drop-shadow(0 0 14px rgba(79,216,255,0.7))";
                      }
                    }}
                    onMouseLeave={(e) => {
                      e.currentTarget.style.transform = "translateX(50%)";
                      e.currentTarget.style.filter = "drop-shadow(0 0 0 rgba(79,216,255,0))";
                    }}
                  >
                    <Pan value={problem.right.value} unit={problem.right.unit} />
                  </div>
                </div>

                {/* Pivote (NO rota) — triángulo apuntando ARRIBA, apex justo debajo del beam */}
                <div style={{
                  position: "absolute", top: 30, left: "50%",
                  transform: "translateX(-50%)",
                  width: 0, height: 0,
                  borderLeft: "22px solid transparent",
                  borderRight: "22px solid transparent",
                  borderBottom: "38px solid #d9a441",
                  filter: "drop-shadow(0 4px 8px rgba(0,0,0,0.55))",
                }} />
                {/* Brillo dentro del pivote */}
                <div style={{
                  position: "absolute", top: 40, left: "50%",
                  transform: "translateX(-50%)",
                  width: 0, height: 0,
                  borderLeft: "10px solid transparent",
                  borderRight: "10px solid transparent",
                  borderBottom: "18px solid rgba(252,233,168,0.55)",
                }} />
                {/* Base inferior */}
                <div style={{
                  position: "absolute", top: 72, left: "50%",
                  transform: "translateX(-50%)",
                  width: 130, height: 8, borderRadius: 4,
                  background: "linear-gradient(180deg, #d9a441 0%, #8a5a20 70%, #4d2900 100%)",
                  border: "1.5px solid #4d2900",
                  boxShadow: "0 6px 14px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.25)",
                }} />
              </div>

              {/* 3 botones de respuesta */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, width: 540 }}>
                {[
                  { key: "left", label: "← IZQUIERDA" },
                  { key: "equal", label: "SON IGUALES" },
                  { key: "right", label: "DERECHA →" },
                ].map((btn) => (
                  <button
                    key={btn.key}
                    onClick={() => answerTapR1(btn.key)}
                    disabled={feedback !== null}
                    className={feedback === null ? "ed-pulse-glow" : ""}
                    style={{
                      fontFamily: "var(--ed-font-display)", fontWeight: 800,
                      fontSize: 16, lineHeight: 1.1,
                      letterSpacing: "0.04em",
                      padding: "16px 0",
                      borderRadius: 14,
                      border: "3px solid rgba(79,216,255,0.6)",
                      background: "linear-gradient(180deg, rgba(20,12,55,0.7), rgba(10,6,35,0.88))",
                      color: "#fce9a8",
                      cursor: feedback !== null ? "not-allowed" : "pointer",
                      textShadow: "0 0 14px rgba(252,233,168,0.4), 0 2px 6px rgba(0,0,0,0.4)",
                      transition: "transform 0.18s ease, border-color 0.18s ease",
                      opacity: feedback !== null ? 0.55 : 1,
                    }}
                    onMouseEnter={(e) => {
                      if (feedback === null) {
                        e.currentTarget.style.transform = "translateY(-3px) scale(1.04)";
                        e.currentTarget.style.borderColor = "#fce9a8";
                      }
                    }}
                    onMouseLeave={(e) => {
                      e.currentTarget.style.transform = "none";
                      e.currentTarget.style.borderColor = "rgba(79,216,255,0.6)";
                    }}
                  >
                    {btn.label}
                  </button>
                ))}
              </div>
            </>
          );
        })()}

        {/* ────── R2: origen + 4 opciones ────── */}
        {problem.idx === 1 && (
          <>
            <div style={{
              display: "inline-flex", alignItems: "baseline", gap: 8,
              padding: "12px 24px",
              borderRadius: 14,
              background: "rgba(10,6,35,0.55)",
              border: "2px solid rgba(252,233,168,0.45)",
              fontFamily: "var(--ed-font-display)", fontWeight: 700,
              color: "#fce9a8",
              textShadow: "0 0 14px rgba(252,233,168,0.4)",
            }}>
              <span style={{ fontSize: 42 }}>{fmt(problem.source.value)}</span>
              <span style={{ fontSize: 26, opacity: 0.85 }}>{problem.source.unit}</span>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 12, width: 480 }}>
              {problem.options.map((op, i) => (
                <button
                  key={i}
                  onClick={() => answerTapR2(i)}
                  disabled={feedback !== null}
                  className={feedback === null ? "ed-pulse-glow" : ""}
                  style={{
                    display: "flex", alignItems: "baseline", justifyContent: "center", gap: 6,
                    padding: "16px 0",
                    borderRadius: 16,
                    border: "3px solid rgba(79,216,255,0.6)",
                    background: "linear-gradient(180deg, rgba(20,12,55,0.7), rgba(10,6,35,0.88))",
                    color: "#fce9a8",
                    cursor: feedback !== null ? "not-allowed" : "pointer",
                    fontFamily: "var(--ed-font-display)", fontWeight: 700,
                    textShadow: "0 0 14px rgba(252,233,168,0.5)",
                    transition: "transform 0.18s ease, border-color 0.18s ease",
                    opacity: feedback !== null ? 0.55 : 1,
                  }}
                  onMouseEnter={(e) => {
                    if (feedback === null) {
                      e.currentTarget.style.transform = "translateY(-4px) scale(1.04)";
                      e.currentTarget.style.borderColor = "#fce9a8";
                    }
                  }}
                  onMouseLeave={(e) => {
                    e.currentTarget.style.transform = "none";
                    e.currentTarget.style.borderColor = "rgba(79,216,255,0.6)";
                  }}
                >
                  <span style={{ fontSize: 32 }}>{fmt(op.value)}</span>
                  <span style={{ fontSize: 20, opacity: 0.85 }}>{op.unit}</span>
                </button>
              ))}
            </div>
          </>
        )}

        {/* ────── R3: paso a paso ────── */}
        {problem.idx === 2 && (
          <>
            {/* Cadena */}
            <div style={{
              display: "flex", alignItems: "baseline", gap: 12,
              padding: "10px 20px",
              borderRadius: 14,
              background: "rgba(10,6,35,0.55)",
              border: "2px solid rgba(252,233,168,0.45)",
              fontFamily: "var(--ed-font-display)", fontWeight: 700,
              color: "#fce9a8",
              textShadow: "0 0 14px rgba(252,233,168,0.4)",
              fontSize: 28,
            }}>
              <span>{fmt(problem.sourceValue)} {problem.sourceUnit}</span>
              <span style={{ opacity: 0.6 }}>→</span>
              <span style={{ opacity: 0.6, fontSize: 22 }}>?</span>
              <span style={{ fontSize: 22, opacity: 0.85 }}>{problem.midUnit}</span>
              <span style={{ opacity: 0.6 }}>→</span>
              <span style={{ opacity: 0.6, fontSize: 22 }}>?</span>
              <span style={{ fontSize: 22, opacity: 0.85 }}>{problem.finalUnit}</span>
            </div>

            {/* Paso completado (si hay) */}
            {completedSteps.length > 0 && (
              <div style={{
                display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                fontFamily: "var(--ed-font-display)", fontWeight: 700,
              }}>
                {completedSteps.map((s, i) => (
                  <div key={i} style={{
                    display: "flex", alignItems: "baseline", gap: 8,
                    fontSize: 20, color: "rgba(252,233,168,0.55)",
                    lineHeight: 1.15,
                  }}>
                    <span>Paso {i + 1}:</span>
                    <span style={{ color: "#fce9a8", fontSize: 22 }}>{fmt(s.value)}</span>
                    <span style={{ opacity: 0.7 }}>
                      {i === 0 ? problem.midUnit : problem.finalUnit}
                    </span>
                  </div>
                ))}
              </div>
            )}

            {/* Slots del paso activo */}
            <div style={{
              display: "flex", flexDirection: "column", alignItems: "center", gap: 8,
            }}>
              <div style={{
                fontFamily: "var(--ed-font-display)", fontWeight: 700,
                fontSize: 18, color: "#4fd8ff",
                letterSpacing: "0.06em", textTransform: "uppercase",
                textShadow: "0 0 10px rgba(79,216,255,0.4)",
              }}>
                Paso {currentStepIdx + 1} de 2 — convierte a {currentStepIdx === 0 ? problem.midUnit : problem.finalUnit}
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                {slots.map((tok, i) => {
                  if (tok === ",") {
                    return (
                      <span key={i} style={{
                        fontSize: 30, color: "#fce9a8",
                        padding: "0 1px",
                        fontFamily: "var(--ed-font-display)", fontWeight: 700,
                      }}>,</span>
                    );
                  }
                  return <SlotBox key={i} value={tok === "_" ? "" : tok} feedback={feedback} size={slotSize()} />;
                })}
              </div>
            </div>
          </>
        )}
      </div>

      {/* Numpad — solo R3 */}
      {problem.idx === 2 && (
        <div data-qa="bandeja" style={{
          position: "absolute", bottom: 14, left: "50%", transform: "translateX(-50%)",
          display: "grid", gridTemplateColumns: "repeat(10, 60px)", gap: 8,
        }}>
          {["1","2","3","4","5","6","7","8","9","0"].map((d, i) => {
            const color = ["#ef5a5a","#f5a623","#f5d84b","#4fa0ff","#2ecc8f"][i % 5];
            return (
              <button
                key={d}
                className="ed-numpad-key"
                onClick={() => pressDigit(d)}
                style={{
                  height: 64, fontSize: 30,
                  borderColor: color,
                  borderWidth: 2, borderStyle: "solid",
                  cursor: "pointer",
                }}
                title="Toca para colocar"
              >
                {d}
              </button>
            );
          })}
        </div>
      )}

      {/* Botones de acción */}
      <div data-qa="acciones" style={{
        position: "absolute", right: 18, top: "50%", transform: "translateY(-50%)",
        display: "flex", flexDirection: "column", gap: 12, width: 150,
      }}>
        {problem.idx === 2 && (
          <>
            <button
              className="ed-btn ed-btn-verify"
              onClick={verify}
              style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}
            >
              ¡VERIFICAR!
            </button>
            <button
              className="ed-btn ed-btn-erase"
              onClick={eraseLast}
              style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}
            >
              BORRAR
            </button>
          </>
        )}
        <button
          className="ed-btn ed-btn-erase"
          onClick={() => setConfirmingRestart(true)}
          title="Reiniciar el juego"
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}
        >
          REINICIAR
        </button>
        <button
          className="ed-btn ed-btn-ghost"
          onClick={() => setConfirmingExit(true)}
          title="Salir al inicio"
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}
        >
          SALIR
        </button>
      </div>

      {/* Feedback overlay */}
      {feedback && (
        <PortalToBody>
          <div style={{
            position: "fixed", inset: 0, zIndex: 1000,
            pointerEvents: "none",
            display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
            gap: 14,
            background: "rgba(0,0,0,0.62)",
            backdropFilter: "blur(3px)",
            animation: "ed-pop-in 0.3s",
          }}>
            <div style={{
              fontFamily: "'Fredoka','Baloo 2',system-ui,sans-serif",
              fontWeight: 700, fontSize: "clamp(60px, 11vmin, 120px)",
              color: feedback === "ok" ? "#2ecc8f" : "#ff6b6b",
              textShadow: "0 4px 0 rgba(0,0,0,0.45), 0 0 60px currentColor",
            }}>
              {feedback === "ok" ? "¡EXCELENTE!" : "¡UPS!"}
            </div>
            {feedbackMsg && (
              <div style={{
                fontFamily: "'Fredoka','Baloo 2',system-ui,sans-serif",
                fontWeight: 700, fontSize: "clamp(18px, 2.6vmin, 30px)",
                color: feedback === "ok" ? "#fce9a8" : "#fff",
                background: "rgba(0,0,0,0.55)",
                padding: "8px 26px", borderRadius: 999,
                textShadow: "0 2px 6px rgba(0,0,0,0.6)",
                textAlign: "center", maxWidth: "80vw",
              }}>
                {feedback === "ok" ? feedbackMsg : `${feedbackMsg} — ${char.name}`}
              </div>
            )}
          </div>
        </PortalToBody>
      )}

      {/* Modal SALIR */}
      {confirmingExit && (
        <PortalToBody>
          <div
            onClick={() => setConfirmingExit(false)}
            style={{
              position: "fixed", inset: 0, zIndex: 1000,
              background: "rgba(0,0,0,0.62)",
              backdropFilter: "blur(4px)",
              display: "flex", alignItems: "center", justifyContent: "center",
              animation: "ed-pop-in 0.18s",
              padding: 16,
            }}
          >
            <div
              onClick={(e) => e.stopPropagation()}
              className="ed-card"
              style={{ padding: 24, maxWidth: 440, textAlign: "center", boxShadow: "var(--ed-shadow-card), 0 0 40px rgba(255,107,107,0.3)" }}
            >
              <div className="ed-label" style={{ color: "#ff8b8b", marginBottom: 6 }}>
                Salir del juego
              </div>
              <h2 className="ed-h1" style={{ fontSize: 22, lineHeight: 1.15, marginBottom: 8 }}>
                ¿Volver al inicio?
              </h2>
              <p className="ed-body" style={{ marginBottom: 16, fontSize: 14 }}>
                Vas a perder el progreso de esta ronda ({attempted}/3 ejercicios). No habrá reporte de esta sesión.
              </p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <button className="ed-btn ed-btn-ghost" onClick={() => setConfirmingExit(false)} style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
                  SEGUIR JUGANDO
                </button>
                <button className="ed-btn ed-btn-primary" onClick={() => { setConfirmingExit(false); go("home"); }} style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
                  SÍ, SALIR
                </button>
              </div>
            </div>
          </div>
        </PortalToBody>
      )}

      {/* Modal REINICIAR */}
      {confirmingRestart && (
        <PortalToBody>
          <div
            onClick={() => setConfirmingRestart(false)}
            style={{
              position: "fixed", inset: 0, zIndex: 1000,
              background: "rgba(0,0,0,0.62)",
              backdropFilter: "blur(4px)",
              display: "flex", alignItems: "center", justifyContent: "center",
              animation: "ed-pop-in 0.18s",
              padding: 16,
            }}
          >
            <div
              onClick={(e) => e.stopPropagation()}
              className="ed-card"
              style={{ padding: 24, maxWidth: 440, textAlign: "center", boxShadow: "var(--ed-shadow-card), 0 0 40px rgba(255,107,107,0.3)" }}
            >
              <div className="ed-label" style={{ color: "#ff8b8b", marginBottom: 6 }}>
                Reiniciar juego
              </div>
              <h2 className="ed-h1" style={{ fontSize: 22, lineHeight: 1.15, marginBottom: 8 }}>
                ¿Empezar de cero?
              </h2>
              <p className="ed-body" style={{ marginBottom: 16, fontSize: 14 }}>
                Vas a perder el progreso de esta ronda ({attempted}/3 ejercicios) y volver al primer ejercicio.
              </p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <button className="ed-btn ed-btn-ghost" onClick={() => setConfirmingRestart(false)} style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
                  SEGUIR JUGANDO
                </button>
                <button className="ed-btn ed-btn-primary" onClick={() => { setConfirmingRestart(false); restartGame(); }} style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
                  SÍ, REINICIAR
                </button>
              </div>
            </div>
          </div>
        </PortalToBody>
      )}
    </div>
  );
}

              className="ed-btn ed-btn-ghost"

            >

            <button className="ed-btn ed-btn-primary" onClick={() => go("game")} style={{ padding: "0 10px", fontSize: 13, height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
              JUGAR OTRA RONDA
            </button>
          </div>
        </div>
      </div>

      <PrintableReport
        studentName={app.studentName}
        res={res}
        dateStr={dateStr}
        m={m} s={s}
        attemptedCount={attemptedCount}
        totalEx={totalEx}
        accuracy={accuracy}
      />

  );
}

Object.assign(window, { GameScreen, ResultsScreen });

// app.jsx — Shell de producción EDINUN GAMES.
// Enrutador por estado y device stage adaptativo (desktop / tablet / mobile).
// Móvil portrait: el contenido NUNCA rota; un overlay BLOQUEANTE obliga
// al usuario a girar físicamente el teléfono antes de poder usar la app.

const { useState: useStateA, useEffect: useEffectA, useRef: useRefA } = React;

// ─────────────────────────────────────────────────────────────
// useViewportSize — devuelve el tamaño REAL visible del viewport.
//
// En iOS Safari (y otros mobile browsers), `window.innerHeight` y `100vh`
// reportan la altura de la ventana INCLUYENDO la URL bar, así que el
// contenido escalado a esa altura termina parcialmente fuera de pantalla
// (ej: el numpad del juego queda debajo del fondo visible). La Visual
// Viewport API reporta el área verdaderamente visible y se actualiza
// cuando la URL bar se muestra/oculta.
// ─────────────────────────────────────────────────────────────
// Detección de "resize REAL" vs "zoom del navegador".
//
// Idea: el tamaño FÍSICO de la zona visible en píxeles del display es
// invariante al ctrl+rueda. Cuando subes el zoom de 100 % a 500 %:
//   · innerWidth en CSS-px se divide entre 5
//   · devicePixelRatio se multiplica por 5
//   · innerWidth × devicePixelRatio queda igual ⇒ NO hubo resize real.
//
// Cuando arrastras la esquina de la ventana o rotas el dispositivo:
//   · innerWidth en CSS-px cambia
//   · devicePixelRatio NO cambia
//   · innerWidth × devicePixelRatio cambia ⇒ SÍ hubo resize real.
//
// Por eso comparamos contra `innerWidth × devicePixelRatio` y solo
// actualizamos el state cuando ese producto cambia. Así el lienzo se
// queda con su tamaño CSS previo durante el zoom y el navegador lo
// amplifica visualmente — junto con los glifos, que ya leen `glyphSize`
// del mismo state defendido (ver DeviceStage).
//
// La defensa anterior (tracker de _lastDPR) era frágil: se actualizaba
// en CADA evento, así que si el navegador disparaba dos resize seguidos
// para la misma acción de zoom, el segundo veía el dpr ya guardado y
// recalculaba el tamaño con el viewport pequeño. Esto causaba que los
// glifos quedaran enormes mientras el lienzo se recomprimía.
function physicalSize() {
  if (typeof window === "undefined") return { w: 0, h: 0 };
  const dpr = window.devicePixelRatio || 1;
  return { w: window.innerWidth * dpr, h: window.innerHeight * dpr };
}
let _lastPhysical = physicalSize();

function useViewportSize() {
  const [size, setSize] = useStateA(() => readSize());
  useEffectA(() => {
    function onChange() {
      const phys = physicalSize();
      // Tolerancia de 4 px reales para absorber redondeos del navegador.
      if (Math.abs(phys.w - _lastPhysical.w) < 4 && Math.abs(phys.h - _lastPhysical.h) < 4) {
        // Mismo display, distinto zoom — no actualizamos el state.
        return;
      }
      _lastPhysical = phys;
      setSize(readSize());
    }
    window.addEventListener("resize", onChange);
    window.addEventListener("orientationchange", onChange);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onChange);
    }
    return () => {
      window.removeEventListener("resize", onChange);
      window.removeEventListener("orientationchange", onChange);
      if (window.visualViewport) {
        window.visualViewport.removeEventListener("resize", onChange);
      }
    };
  }, []);
  return size;
}
function readSize() {
  if (typeof window === "undefined") return { vw: 0, vh: 0 };
  const vv = window.visualViewport;
  // Cuando el usuario hace pinch-zoom, vv.scale > 1 y vv.width/height
  // reflejan la región visible (más pequeña). Usar esos valores haría
  // que la escala del lienzo se reduzca al hacer zoom — exactamente lo
  // contrario de lo que el usuario quiere. Solo confiamos en vv cuando
  // scale ≈ 1 (sin zoom) — ahí da una lectura más fiel que innerWidth/
  // Height en iOS Safari (descuenta correctamente la URL bar visible).
  if (vv && Math.abs(vv.scale - 1) < 0.05) {
    return { vw: vv.width, vh: vv.height };
  }
  return { vw: window.innerWidth, vh: window.innerHeight };
}

// ─────────────────────────────────────────────────────────────
// DeviceStage — escala el lienzo lógico 900×540 (paisaje) al viewport.
//
// Reglas:
//   · Desktop / tablet: sin marco, sin notch, fondo cósmico edge-to-edge.
//   · Mobile portrait: lienzo letterboxed Y overlay BLOQUEANTE "Gira el
//     teléfono". El contenido del juego no es accesible hasta que rote.
//   · Mobile landscape: lienzo escalado al viewport visible (visualViewport,
//     no innerHeight, para no clippearse debajo de la URL bar de iOS).
// ─────────────────────────────────────────────────────────────
function DeviceStage({ children, variant = "cosmic" }) {
  const W = 900, H = 540;
  const { vw, vh } = useViewportSize();
  const minSide = Math.min(vw, vh);
  const maxSide = Math.max(vw, vh);
  let mode = "desktop";
  if (maxSide < 820) mode = "mobile";
  else if (minSide < 820) mode = "tablet";
  const portrait = vh > vw;
  const baseScale = Math.max(Math.min(vw / W, vh / H), 0.15);

  // Detección de teléfono independiente del modo: cualquier dispositivo con
  // lado menor ≤ 600 CSS-px es un teléfono. Cubre todos los teléfonos
  // actuales (iPhone SE 320 → S25 Ultra/Pro Max ~432) con margen para
  // modelos futuros más anchos. La menor tablet (iPad mini 744) queda
  // bien por encima, así que no se rompe el caso "tablet portrait usable
  // letterboxed". Solo bloqueamos cuando teléfono Y portrait — el lienzo
  // paisaje queda demasiado pequeño para jugar.
  const isPhone = minSide <= 600;
  const lockPortrait = isPhone && portrait;

  // Tamaño de los glifos del fondo: equivalente al `clamp(48px, 7vmin, 110px)`
  // que tenía el CSS, pero calculado a partir del vw/vh DEFENDIDO contra
  // cambios de DPR. Esto evita que con ctrl+rueda del mouse los glifos
  // crezcan más rápido que el lienzo (el lienzo se congela vía la defensa
  // del DPR; si CSS lee el vmin actual, los glifos no se congelan y desync).
  const glyphSize = Math.max(48, Math.min(minSide * 0.07, 110));

  const debug = typeof window !== "undefined" && /(?:^|[#&])debug(?:&|$)/.test(window.location.hash || "");

  // ─── Pinch-zoom y pan custom ─────────────────────────────────
  // Reemplaza el zoom nativo del browser. Razón: con el lienzo letterboxed
  // dentro de un wrapper viewport-sized, el visual viewport del browser
  // puede panear hasta dejar al usuario mirando solo el cosmos vacío de los
  // bordes — el "rebote" reportado en iPhone (ver .planning/ios-zoom.md).
  // Aquí los gestos operan sobre el transform del lienzo, así que el zoom
  // siempre gravita alrededor del contenido y no deriva a un borde
  // decorativo.
  const wrapperRef = useRefA(null);
  const gestureRef = useRefA(null);
  const stateRef = useRefA({ userZoom: 1, pan: { x: 0, y: 0 } });
  const [userZoom, setUserZoom] = useStateA(1);
  const [pan, setPan] = useStateA({ x: 0, y: 0 });
  const [duringGesture, setDuringGesture] = useStateA(false);

  useEffectA(() => {
    stateRef.current = { userZoom, pan };
  }, [userZoom, pan]);

  // Reset al cambiar viewport (rotación, resize). Si no, el pan queda
  // referenciado a un viewport que ya no existe.
  useEffectA(() => {
    setUserZoom(1);
    setPan({ x: 0, y: 0 });
    setDuringGesture(false);
  }, [vw, vh]);

  useEffectA(() => {
    if (lockPortrait) return;
    const el = wrapperRef.current;
    if (!el) return;

    const Z_MIN = 1;
    const Z_MAX = 4;

    const dist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const mid = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

    function clampPan(zoom, px, py) {
      // Pan máximo: la mitad del exceso del lienzo escalado sobre el viewport.
      // En zoom=1 el max es 0 (lienzo cabe en viewport, no hay donde panear).
      // En zoom=N el lienzo mide N veces el lado contain, así que el usuario
      // puede mover ±(sw - vw)/2 antes de que la orilla del lienzo cruce la
      // orilla del viewport. Esto evita perder el contenido fuera de pantalla.
      const sw = baseScale * zoom * W;
      const sh = baseScale * zoom * H;
      const maxX = Math.max(0, (sw - vw) / 2);
      const maxY = Math.max(0, (sh - vh) / 2);
      return {
        x: Math.max(-maxX, Math.min(maxX, px)),
        y: Math.max(-maxY, Math.min(maxY, py)),
      };
    }

    function applyState(z, px, py) {
      stateRef.current = { userZoom: z, pan: { x: px, y: py } };
      setUserZoom(z);
      setPan({ x: px, y: py });
    }

    function onTouchStart(e) {
      const { userZoom: z0, pan: p0 } = stateRef.current;
      if (e.touches.length >= 2) {
        const [t0, t1] = e.touches;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0, p0: { ...p0 },
        };
        setDuringGesture(true);
        e.preventDefault();
      } else if (e.touches.length === 1) {
        const t = e.touches[0];
        gestureRef.current = {
          mode: "pan-armed",
          startX: t.clientX,
          startY: t.clientY,
          z0, p0: { ...p0 },
        };
        // No preventDefault — un tap simple debe seguir generando click.
      }
    }

    function onTouchMove(e) {
      const g = gestureRef.current;
      if (!g) return;

      // Si en medio de un gesto entra un segundo dedo, transición a pinch
      // tomando el estado actual como punto de partida.
      if (e.touches.length >= 2 && g.mode !== "pinch") {
        const [t0, t1] = e.touches;
        const { userZoom: zNow, pan: pNow } = stateRef.current;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0: zNow, p0: { ...pNow },
        };
        setDuringGesture(true);
        e.preventDefault();
        return;
      }

      if (e.touches.length >= 2 && g.mode === "pinch") {
        const [t0, t1] = e.touches;
        const d = dist(t0, t1);
        const m = mid(t0, t1);
        const ratio = d / g.d0;
        // Permitimos pasar transitoriamente bajo Z_MIN para sensación elástica
        // durante el gesto; en touchend hacemos snap-back al rango válido.
        const newZoom = Math.max(Z_MIN * 0.7, Math.min(Z_MAX * 1.05, g.z0 * ratio));
        const r = newZoom / g.z0;
        const ux = g.m0.x - vw / 2;
        const uy = g.m0.y - vh / 2;
        // Fórmula que mantiene el punto medio de la pinza anclado al mismo
        // píxel del lienzo durante todo el gesto. Derivación:
        //   panX_new = (mx0 - vw/2) + (newZoom/z0) * (panX0 - (mx0 - vw/2))
        //              + (mx_now - mx0)   ← desplazamiento del propio gesto
        const newPanX = ux + r * (g.p0.x - ux) + (m.x - g.m0.x);
        const newPanY = uy + r * (g.p0.y - uy) + (m.y - g.m0.y);
        applyState(newZoom, newPanX, newPanY);
        e.preventDefault();
      } else if (e.touches.length === 1 && g.mode === "pan-armed") {
        if (g.z0 <= 1.001) return; // sin zoom no panea — dejamos pasar el tap
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        if (Math.hypot(dx, dy) > 8) {
          gestureRef.current = { ...g, mode: "pan" };
          setDuringGesture(true);
          e.preventDefault();
        }
      } else if (e.touches.length === 1 && g.mode === "pan") {
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        applyState(g.z0, g.p0.x + dx, g.p0.y + dy);
        e.preventDefault();
      }
    }

    function onTouchEnd(e) {
      const g = gestureRef.current;
      if (!g) return;
      if (e.touches.length === 0) {
        const { userZoom: z, pan: p } = stateRef.current;
        const clampedZ = Math.max(Z_MIN, Math.min(Z_MAX, z));
        let cp;
        if (clampedZ <= 1.001) {
          cp = { x: 0, y: 0 };
        } else {
          cp = clampPan(clampedZ, p.x, p.y);
        }
        applyState(clampedZ, cp.x, cp.y);
        setDuringGesture(false);
        gestureRef.current = null;
      }
    }

    el.addEventListener("touchstart", onTouchStart, { passive: false });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd, { passive: false });
    el.addEventListener("touchcancel", onTouchEnd, { passive: false });

    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      el.removeEventListener("touchend", onTouchEnd);
      el.removeEventListener("touchcancel", onTouchEnd);
    };
  }, [vw, vh, baseScale, lockPortrait]);

  const totalScale = baseScale * userZoom;

  return (
    <div ref={wrapperRef} style={{
      width: "100vw", height: "100dvh",
      minHeight: "-webkit-fill-available",
      overflow: "hidden",
      position: "relative",
      background: variant === "chalkboard" ? "#0b3a2d" : "#050214",
      // `touch-action: none` desactiva todos los gestos que el browser
      // interpretaría por su cuenta (pinch, pan, doble-tap-zoom). Los
      // implementamos en JS sobre el transform del lienzo para que el
      // zoom siempre quede anclado al contenido y nunca derive a los
      // bordes letterbox del wrapper. Los click/tap en botones siguen
      // funcionando — esto solo bloquea gestos del browser, no eventos.
      touchAction: "none",
    }}>
      <CosmosBg variant={variant} glyphSize={glyphSize} />

      {/* Lienzo lógico 900×540 centrado y escalado.
          El transform combina el escalado base (contain del viewport),
          el zoom del usuario y el pan acumulado. El orden CSS es
          right-to-left: scale → translate(pan) → translate(-50%,-50%). */}
      <div style={{
        width: W, height: H,
        position: "absolute",
        left: "50%", top: "50%",
        transform: `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px) scale(${totalScale})`,
        transformOrigin: "center center",
        overflow: "hidden",
        // Sin transición durante el gesto activo (el lienzo sigue la pinza
        // al instante); con transición elástica al soltar, para que el
        // snap-back de zoom/pan a los límites válidos no sea abrupto.
        transition: duringGesture ? "none" : "transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1)",
        willChange: "transform",
      }}>
        {children}
      </div>

      {lockPortrait && <RotateLockOverlay />}
      {debug && (
        <div style={{
          position: "fixed", top: 6, left: 6, zIndex: 999999,
          background: "rgba(0,0,0,0.85)", color: "#0f0",
          font: "11px ui-monospace,Menlo,monospace",
          padding: "6px 8px", borderRadius: 6,
          maxWidth: "90vw", whiteSpace: "pre",
          pointerEvents: "none",
        }}>
{`vw=${vw} vh=${vh}
min=${minSide} max=${maxSide}
mode=${mode} portrait=${portrait}
isPhone=${isPhone} LOCK=${lockPortrait}
zoom=${userZoom.toFixed(2)} pan=${pan.x.toFixed(0)},${pan.y.toFixed(0)}
vv=${typeof window!=="undefined" && window.visualViewport ? "yes" : "no"}
ua=${(typeof navigator!=="undefined" ? navigator.userAgent : "?").slice(0,60)}`}
        </div>
      )}
    </div>
  );
}

// Overlay bloqueante de rotación. En mobile portrait cubre toda la pantalla
// con un mensaje claro y un ícono animado. NO se puede descartar — el usuario
// DEBE girar el dispositivo para acceder al juego. Se desmonta solo cuando
// el viewport pasa a landscape.
function RotateLockOverlay() {
  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="Gira tu teléfono para jugar"
      style={{
        position: "fixed", inset: 0, zIndex: 99999,
        background: "linear-gradient(180deg,#050214 0%,#0a0628 100%)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        textAlign: "center", padding: "32px 24px",
        color: "#fce9a8",
        fontFamily: "var(--ed-font-display, system-ui)",
      }}
    >
      <div
        style={{
          width: 132, height: 132, marginBottom: 28,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "ed-rotate-lock 2.4s ease-in-out infinite",
        }}
        aria-hidden="true"
      >
        {/* Ícono de teléfono que rota */}
        <svg viewBox="0 0 100 100" width="120" height="120" fill="none">
          <rect x="36" y="14" width="28" height="72" rx="6"
                stroke="#f2c260" strokeWidth="3" fill="rgba(242,194,96,0.08)" />
          <rect x="42" y="22" width="16" height="48" rx="2" fill="rgba(242,194,96,0.18)" />
          <circle cx="50" cy="78" r="2.5" fill="#f2c260" />
        </svg>
      </div>
      <div style={{
        fontWeight: 800,
        fontSize: "clamp(18px, 5.2vw, 26px)",
        lineHeight: 1.15,
        textTransform: "uppercase", letterSpacing: "0.02em",
        marginBottom: 12,
      }}>
        Gira tu teléfono
      </div>
      <div style={{
        fontWeight: 500,
        fontSize: "clamp(13px, 4vw, 16px)",
        lineHeight: 1.4,
        color: "rgba(252,233,168,0.78)",
        maxWidth: "min(320px, 80vw)",
      }}>
        Pon tu teléfono de lado para jugar.
      </div>
      <style>{`
        @keyframes ed-rotate-lock {
          0%   { transform: rotate(0deg); }
          45%  { transform: rotate(0deg); }
          70%  { transform: rotate(-90deg); }
          100% { transform: rotate(-90deg); }
        }
      `}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App principal
// ─────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useStateA("home");
  const [app, setApp] = useStateA({
    studentName: "",
    character: "mago",
    level: "basic",
    stars: 0,
    sessionStart: Date.now(),
    gameSeed: 0,
  });

  function go(r) {
    // Al (re)entrar al juego, regeneramos la seed para que GameScreen se remonte
    // y reinicie ronda, tiempo, racha, etc. También reseteamos las estrellas:
    // cada partida empieza desde 0, no acumula entre rondas.
    if (r === "game") {
      setApp((s) => ({ ...s, gameSeed: (s.gameSeed || 0) + 1, stars: 0 }));
    }
    setRoute(r);
  }

  const screenProps = { app, setApp, go };

  let Screen = window.HomeScreen;
  if (route === "character") Screen = window.CharacterScreen;
  else if (route === "game") Screen = window.GameScreen;
  else if (route === "results") Screen = window.ResultsScreen;

  const variant = route === "game" ? "chalkboard" : "cosmic";

  return (
    <DeviceStage variant={variant}>
      <Screen key={route === "game" ? `game-${app.gameSeed}` : route} {...screenProps} />
    </DeviceStage>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
